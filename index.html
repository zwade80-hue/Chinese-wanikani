  const rows=stages.map((s,i)=>{const cnt=sc[s.name]||0,last=i===stages.length-1;return'<div style="display:flex;align-items:stretch;gap:0;margin-bottom:0"><div style="display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0"><div style="width:36px;height:36px;border-radius:50%;background:'+s.color+'22;border:2px solid '+s.color+';display:flex;align-items:center;justify-content:center;font-size:16px;z-index:1">'+s.icon+'</div>'+(last?"":'<div style="width:2px;flex:1;background:'+s.color+';min-height:32px;opacity:.2"></div>')+'</div><div style="flex:1;padding:0 0 28px 16px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap"><span style="font-size:15px;font-weight:700;color:'+s.color+'">'+s.name+'</span><span style="background:'+s.color+'18;color:'+s.color+';font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px">+'+s.interval+'</span></div><div style="font-size:13px;color:var(--text2);margin-bottom:6px">'+s.desc+'</div>'+(cnt>0?'<span style="font-size:12px;font-weight:600;color:'+s.color+'">'+cnt+' item'+(cnt!==1?"s":"")+'</span>':'<span style="font-size:12px;color:var(--muted)">No items yet</span>')+'</div></div>';}).join("");
  app.innerHTML=navHTML("srs")+'<h2>SRS Guide</h2><p class="sub">How characters unlock vocabulary</p><div class="card" style="margin-bottom:1.25rem;border-color:var(--red)22"><div class="card-label">The unlock system</div><div style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:16px"><b style="color:var(--text)">Characters (red)</b> are learned first. Once a character reaches <b style="color:var(--guru)">Guru</b>, vocabulary words built from it unlock (purple). This means you always understand the building blocks before seeing compound words.<br><br>Example: learn 山 and 水 separately → guru them → 山水 (landscape) unlocks.</div><div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center"><div style="flex:1;min-width:90px;background:var(--red)11;border:1px solid var(--red)33;border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Noto Serif SC\',serif;font-size:28px;color:var(--red)">山</div><div style="font-size:12px;color:var(--red);font-weight:700">Character</div></div><div style="font-size:24px;color:var(--muted)">+</div><div style="flex:1;min-width:90px;background:var(--red)11;border:1px solid var(--red)33;border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Noto Serif SC\',serif;font-size:28px;color:var(--red)">水</div><div style="font-size:12px;color:var(--red);font-weight:700">Character</div></div><div style="font-size:24px;color:var(--muted)">→ Guru →</div><div style="flex:1;min-width:90px;background:var(--purple)11;border:1px solid var(--purple)33;border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Noto Serif SC\',serif;font-size:28px;color:var(--purple)">山水</div><div style="font-size:12px;color:var(--purple);font-weight:700">Vocab Unlocks</div></div></div></div><div class="card"><div class="card-label">Stage timeline</div><div style="margin-top:8px">'+rows+'</div></div>';
}

const WORDS_DATA=[{"id":1,"type":"character","hanzi":"的","pinyin":"de","tone":0,"english":"(possessive particle)","meaning":"Possessive/modifying particle. 我的书=my book. One of the most used characters in Chinese.","example_zh":"我的书","example_en":"wǒ de shū — my book","etymology":"Compound"},{"id":2,"type":"character","hanzi":"一","pinyin":"yī","tone":1,"english":"one","meaning":"The number one. One of the most basic and ancient characters — a single horizontal stroke.","example_zh":"一个人","example_en":"yī gè rén — one person","etymology":"Pictographic"},{"id":3,"type":"character","hanzi":"是","pinyin":"shì","tone":4,"english":"to be","meaning":"To be (is, am, are). The main linking verb. Negated as 不是 (bú shì — is not).","example_zh":"我是老师","example_en":"wǒ shì lǎoshī — I am a teacher","etymology":"Ideographic"},{"id":4,"type":"character","hanzi":"不","pinyin":"bù","tone":4,"english":"not / no","meaning":"Negation: not, no. Changes to 2nd tone (bú) before another 4th-tone syllable.","example_zh":"我不知道","example_en":"wǒ bù zhīdào — I don't know","etymology":"Pictographic"},{"id":5,"type":"character","hanzi":"了","pinyin":"le","tone":0,"english":"(completed action particle)","meaning":"Marks completed action or change of state. 他来了=he came. 天黑了=it got dark.","example_zh":"我吃了","example_en":"wǒ chī le — I ate (already)","etymology":"Compound"},{"id":6,"type":"character","hanzi":"有","pinyin":"yǒu","tone":3,"english":"to have","meaning":"To have; there is/are. Negated as 没有 (méiyǒu). One of the most used verbs.","example_zh":"我有问题","example_en":"wǒ yǒu wèntí — I have a question","etymology":"Compound"},{"id":7,"type":"character","hanzi":"和","pinyin":"hé","tone":2,"english":"and / with","meaning":"And, with — connects nouns. 你和我=you and me. Not used between verbs like English 'and'.","example_zh":"你和我","example_en":"nǐ hé wǒ — you and me","etymology":"Compound"},{"id":8,"type":"character","hanzi":"人","pinyin":"rén","tone":2,"english":"person","meaning":"A person. The character looks like a walking figure with two legs spread apart.","example_zh":"中国人","example_en":"Zhōngguó rén — Chinese person","etymology":"Pictographic"},{"id":9,"type":"character","hanzi":"这","pinyin":"zhè","tone":4,"english":"this","meaning":"This (nearby). 这个=this one. Opposite of 那 (nà, that). Essential demonstrative.","example_zh":"这是什么","example_en":"zhè shì shénme — what is this?","etymology":"Pictographic"},{"id":10,"type":"character","hanzi":"中","pinyin":"zhōng","tone":1,"english":"middle","meaning":"Middle, center. A line through the center of a box — hitting the middle.","example_zh":"中间","example_en":"zhōngjiān — in the middle","etymology":"Pictographic"},{"id":11,"type":"character","hanzi":"大","pinyin":"dà","tone":4,"english":"big","meaning":"Big, large, great. A person with arms outstretched wide — showing size.","example_zh":"很大","example_en":"hěn dà — very big","etymology":"Pictographic"},{"id":12,"type":"character","hanzi":"为","pinyin":"wèi","tone":4,"english":"for / because of","meaning":"For, because of. 为什么=why. 为了=in order to.","example_zh":"为什么不来","example_en":"wèishénme bù lái — why aren't you coming?","etymology":"Pictographic"},{"id":13,"type":"character","hanzi":"上","pinyin":"shàng","tone":4,"english":"up / above","meaning":"Up, above, on top. A short line above a longer line — above.","example_zh":"上面","example_en":"shàngmiàn — above, on top","etymology":"Ideographic"},{"id":14,"type":"character","hanzi":"个","pinyin":"gè","tone":4,"english":"(measure word)","meaning":"Most common measure word for people and objects. 一个人=one person. 三个苹果=three apples.","example_zh":"三个苹果","example_en":"sān gè píngguǒ — three apples","etymology":"Ideographic"},{"id":15,"type":"character","hanzi":"国","pinyin":"guó","tone":2,"english":"country","meaning":"Country, nation. A jewel inside a border — something precious enclosed by boundaries.","example_zh":"国家","example_en":"guójiā — country, nation","etymology":"Compound"},{"id":16,"type":"character","hanzi":"我","pinyin":"wǒ","tone":3,"english":"I / me","meaning":"I, me. First person singular pronoun. Contains the radical for hand holding a weapon.","example_zh":"我是学生","example_en":"wǒ shì xuéshēng — I am a student","etymology":"Compound"},{"id":17,"type":"character","hanzi":"以","pinyin":"yǐ","tone":3,"english":"by / with / because","meaning":"By, because. 所以=therefore. 以前=before. 以为=to assume.","example_zh":"以前我不会","example_en":"yǐqián wǒ bú huì — I couldn't before","etymology":"Compound"},{"id":18,"type":"character","hanzi":"要","pinyin":"yào","tone":4,"english":"to want / will / need","meaning":"Want, will, need. 我要=I want. 不要=don't want / don't!","example_zh":"我要喝茶","example_en":"wǒ yào hē chá — I want tea","etymology":"Compound"},{"id":19,"type":"character","hanzi":"他","pinyin":"tā","tone":1,"english":"he / him","meaning":"He, him. Third person masculine pronoun. Sounds identical to 她 (she) and 它 (it).","example_zh":"他是我朋友","example_en":"tā shì wǒ péngyou — he is my friend","etymology":"Compound"},{"id":20,"type":"character","hanzi":"时","pinyin":"shí","tone":2,"english":"time / hour / when","meaning":"Time, hour, when. 有时=sometimes. 那时=at that time. Used in many time expressions.","example_zh":"有时候我很忙","example_en":"yǒu shíhou wǒ hěn máng — sometimes I'm very busy","etymology":"Compound"},{"id":21,"type":"character","hanzi":"来","pinyin":"lái","tone":2,"english":"to come","meaning":"To come, to arrive. Opposite of 去 (qù, to go).","example_zh":"他来了","example_en":"tā lái le — he has come","etymology":"Pictographic"},{"id":22,"type":"character","hanzi":"用","pinyin":"yòng","tone":4,"english":"to use","meaning":"To use. 有用=useful. 用法=usage. 不用=no need to.","example_zh":"怎么用","example_en":"zěnme yòng — how do you use it?","etymology":"Compound"},{"id":23,"type":"character","hanzi":"们","pinyin":"men","tone":0,"english":"plural suffix","meaning":"Plural suffix for pronouns: 我们=we, 你们=you all, 他们=they. Always neutral tone, unstressed.","example_zh":"他们是好朋友","example_en":"tāmen shì hǎo péngyou — they are good friends","etymology":"Compound"},{"id":24,"type":"character","hanzi":"生","pinyin":"shēng","tone":1,"english":"life / born / raw","meaning":"Life, born, raw. 生活=life. 出生=born. 生日=birthday. 学生=student.","example_zh":"生日快乐","example_en":"shēngrì kuàilè — happy birthday","etymology":"Pictographic"},{"id":25,"type":"character","hanzi":"作","pinyin":"zuò","tone":4,"english":"to do / to make","meaning":"Do, make. 工作=work. 制作=produce.","example_zh":"做什么工作","example_en":"zuò shénme gōngzuò — what work do you do?","etymology":"Compound"},{"id":26,"type":"character","hanzi":"地","pinyin":"dì","tone":4,"english":"ground / earth","meaning":"Ground, earth, place. Also an adverbial particle (de) in spoken Chinese.","example_zh":"土地","example_en":"tǔdì — land, soil","etymology":"Compound"},{"id":27,"type":"character","hanzi":"于","pinyin":"yú","tone":2,"english":"at/in/from (formal)","meaning":"At. 由于=due to.","example_zh":"对于这个","example_en":"duìyú zhège — regarding this","etymology":"Compound"},{"id":28,"type":"character","hanzi":"出","pinyin":"chū","tone":1,"english":"to exit / to produce","meaning":"Exit, produce. 出来=come out. 出发=depart. 出现=appear.","example_zh":"出来吧","example_en":"chūlai ba — come out","etymology":"Pictographic"},{"id":29,"type":"character","hanzi":"就","pinyin":"jiù","tone":4,"english":"then / right away / just","meaning":"Then, right away, just. 就是=exactly, that's right. 我就来=I'll be right there.","example_zh":"我就来","example_en":"wǒ jiù lái — I'll be right there","etymology":"Compound"},{"id":30,"type":"character","hanzi":"分","pinyin":"fēn","tone":1,"english":"divide","meaning":"Score. 分数=score.","example_zh":"分数","example_en":"fēnshù — score/fraction","etymology":"Compound"},{"id":31,"type":"character","hanzi":"对","pinyin":"duì","tone":4,"english":"correct / toward","meaning":"Correct, right, toward. 对不对=is that right? 对着=facing toward.","example_zh":"你说得对","example_en":"nǐ shuō de duì — you are correct","etymology":"Compound"},{"id":32,"type":"character","hanzi":"成","pinyin":"chéng","tone":2,"english":"to succeed / to become","meaning":"Succeed, become. 成功=succeed. 完成=complete.","example_zh":"成功了","example_en":"chénggōng le — succeeded","etymology":"Compound"},{"id":33,"type":"character","hanzi":"会","pinyin":"huì","tone":4,"english":"can / will / meeting","meaning":"Can (learned skill), will (future), meeting. 你会吗=can you? 开会=hold a meeting.","example_zh":"你会说中文吗","example_en":"nǐ huì shuō Zhōngwén ma — can you speak Chinese?","etymology":"Compound"},{"id":34,"type":"character","hanzi":"可","pinyin":"kě","tone":3,"english":"can / but / quite","meaning":"Can, but. 可以=can/may. 可是=but. 可能=possible.","example_zh":"可以吗","example_en":"kěyǐ ma — may I?","etymology":"Compound"},{"id":35,"type":"character","hanzi":"主","pinyin":"zhǔ","tone":3,"english":"main/host","meaning":"Main. 民主=democracy.","example_zh":"主要原因","example_en":"zhǔyào yuányīn — main reason","etymology":"Ideographic"},{"id":36,"type":"character","hanzi":"发","pinyin":"fā","tone":1,"english":"to send / to happen","meaning":"Send, happen. 发现=discover. 发展=develop. 出发=depart.","example_zh":"出发吧","example_en":"chūfā ba — let's depart","etymology":"Compound"},{"id":37,"type":"character","hanzi":"年","pinyin":"nián","tone":2,"english":"year","meaning":"Year. Used for counting years. 今年 = this year; 新年 = new year.","example_zh":"今年","example_en":"jīnnián — this year","etymology":"Compound"},{"id":38,"type":"character","hanzi":"动","pinyin":"dòng","tone":4,"english":"to move / movement","meaning":"Move, movement. 运动=exercise. 活动=activity.","example_zh":"运动很好","example_en":"yùndòng hěn hǎo — exercise is great","etymology":"Compound"},{"id":39,"type":"character","hanzi":"工","pinyin":"gōng","tone":1,"english":"work / labor","meaning":"Work. 工作=work. 工人=worker.","example_zh":"好好工作","example_en":"hǎohǎo gōngzuò — work hard","etymology":"Pictographic"},{"id":40,"type":"character","hanzi":"也","pinyin":"yě","tone":3,"english":"also / too","meaning":"Also, too, as well. 我也是=me too. Placed before the verb.","example_zh":"我也喜欢","example_en":"wǒ yě xǐhuān — I also like it","etymology":"Ideographic"},{"id":41,"type":"character","hanzi":"能","pinyin":"néng","tone":2,"english":"can / able to","meaning":"Can, able to (circumstantial). 能来吗=can you come? Different from 会 (learned skill).","example_zh":"你能帮我吗","example_en":"nǐ néng bāng wǒ ma — can you help me?","etymology":"Pictographic"},{"id":42,"type":"character","hanzi":"下","pinyin":"xià","tone":4,"english":"down / below","meaning":"Down, below, under. A short line below a longer line — below.","example_zh":"下面","example_en":"xiàmiàn — below, underneath","etymology":"Ideographic"},{"id":43,"type":"character","hanzi":"过","pinyin":"guò","tone":4,"english":"to pass / (experience particle)","meaning":"Pass, cross; experience marker. 过来=come over. 吃过=have eaten before.","example_zh":"我去过中国","example_en":"wǒ qù guò Zhōngguó — I've been to China","etymology":"Compound"},{"id":44,"type":"character","hanzi":"子","pinyin":"zi","tone":0,"english":"child / (noun suffix)","meaning":"Child; noun suffix. 孩子=child. 桌子=table. 饺子=dumplings.","example_zh":"孩子很可爱","example_en":"háizi hěn kě'ài — the child is cute","etymology":"Pictographic"},{"id":45,"type":"character","hanzi":"说","pinyin":"shuō","tone":1,"english":"to speak","meaning":"To speak, say, tell. The speech radical 讠on the left shows it relates to language.","example_zh":"他说中文","example_en":"tā shuō Zhōngwén — he speaks Chinese","etymology":"Compound"},{"id":46,"type":"character","hanzi":"产","pinyin":"chǎn","tone":3,"english":"to produce / product","meaning":"Produce. 产品=product. 生产=produce.","example_zh":"我们的产品","example_en":"wǒmen de chǎnpǐn — our product","etymology":"Compound"},{"id":47,"type":"character","hanzi":"种","pinyin":"zhǒng","tone":3,"english":"type / kind / to plant","meaning":"Type, kind. 种类=type. 一种=a kind of. 种树=plant a tree.","example_zh":"各种方法","example_en":"gè zhǒng fāngfǎ — all kinds of methods","etymology":"Compound"},{"id":48,"type":"character","hanzi":"面","pinyin":"miàn","tone":4,"english":"face / surface / noodles","meaning":"Face, surface, side, noodles. 上面=above. 下面=below. 面对=face up to.","example_zh":"上面有什么","example_en":"shàngmiàn yǒu shénme — what's on top?","etymology":"Pictographic"},{"id":49,"type":"character","hanzi":"而","pinyin":"ér","tone":2,"english":"and/but","meaning":"And, but. 然而=however.","example_zh":"然而","example_en":"rán'ér — however","etymology":"Compound"},{"id":50,"type":"character","hanzi":"方","pinyin":"fāng","tone":1,"english":"direction / method","meaning":"Direction, square, method. 地方=place. 方法=method. 东方=east.","example_zh":"这个方法很好","example_en":"zhège fāngfǎ hěn hǎo — this method is very good","etymology":"Pictographic"},{"id":51,"type":"character","hanzi":"后","pinyin":"hòu","tone":4,"english":"after / behind","meaning":"After, behind. 然后=then. 以后=after. 后来=later.","example_zh":"然后他走了","example_en":"ránhòu tā zǒu le — then he left","etymology":"Compound"},{"id":52,"type":"character","hanzi":"多","pinyin":"duō","tone":1,"english":"many / much","meaning":"Many, much, more. 多少 (duōshao) = how much/many? Very common in questions.","example_zh":"很多人","example_en":"hěn duō rén — many people","etymology":"Compound"},{"id":53,"type":"character","hanzi":"定","pinyin":"dìng","tone":4,"english":"to decide / to set","meaning":"Decide, set. 确定=certain. 决定=decide.","example_zh":"你决定了吗","example_en":"nǐ juédìng le ma — have you decided?","etymology":"Compound"},{"id":54,"type":"character","hanzi":"行","pinyin":"xíng","tone":2,"english":"to walk / to be okay / profession","meaning":"Walk, okay. 行吗=is it okay? 旅行=travel.","example_zh":"行吗","example_en":"xíng ma — is it okay?","etymology":"Pictographic"},{"id":55,"type":"character","hanzi":"学","pinyin":"xué","tone":2,"english":"to study","meaning":"To study, learn. 学生 = student; 学校 = school. A very common character.","example_zh":"我学中文","example_en":"wǒ xué Zhōngwén — I study Chinese","etymology":"Compound"},{"id":56,"type":"character","hanzi":"法","pinyin":"fǎ","tone":3,"english":"law / method / France","meaning":"Law, method. 方法=method. 法律=law.","example_zh":"这个方法好","example_en":"zhège fāngfǎ hǎo — this method is good","etymology":"Compound"},{"id":57,"type":"character","hanzi":"所","pinyin":"suǒ","tone":3,"english":"(structure word) / place","meaning":"Structure word. 所以=therefore. 所有=all/everything. 厕所=restroom.","example_zh":"所以我来了","example_en":"suǒyǐ wǒ lái le — so I came","etymology":"Ideographic"},{"id":58,"type":"character","hanzi":"民","pinyin":"mín","tone":2,"english":"people/civilian","meaning":"People. 人民=people.","example_zh":"人民","example_en":"rénmín — the people","etymology":"Pictographic"},{"id":59,"type":"character","hanzi":"得","pinyin":"de","tone":0,"english":"(result/manner particle)","meaning":"Result particle showing degree/manner. 做得好=do well. 跑得快=run fast.","example_zh":"他跑得很快","example_en":"tā pǎo de hěn kuài — he runs very fast","etymology":"Compound"},{"id":60,"type":"character","hanzi":"经","pinyin":"jīng","tone":1,"english":"pass through / classic","meaning":"Pass through, classic. 已经=already. 经常=often.","example_zh":"已经知道了","example_en":"yǐjīng zhīdào le — already knew","etymology":"Compound"},{"id":61,"type":"character","hanzi":"三","pinyin":"sān","tone":1,"english":"three","meaning":"The number three. Three horizontal strokes.","example_zh":"三天","example_en":"sān tiān — three days","etymology":"Pictographic"},{"id":62,"type":"character","hanzi":"进","pinyin":"jìn","tone":4,"english":"to enter / advance","meaning":"Enter, advance. 进来=come in. 进步=progress.","example_zh":"请进来","example_en":"qǐng jìnlai — please come in","etymology":"Compound"},{"id":63,"type":"character","hanzi":"着","pinyin":"zhe","tone":0,"english":"ongoing action particle","meaning":"Ongoing state/action. 等着=waiting. 穿着=wearing. 看着=looking at.","example_zh":"她笑着说","example_en":"tā xiào zhe shuō — she said smiling","etymology":"Compound"},{"id":64,"type":"character","hanzi":"等","pinyin":"děng","tone":3,"english":"to wait / etc.","meaning":"Wait, et cetera. 等一下=wait a moment. 等等=et cetera.","example_zh":"请等一下","example_en":"qǐng děng yīxià — please wait a moment","etymology":"Compound"},{"id":65,"type":"character","hanzi":"度","pinyin":"dù","tone":4,"english":"degree / limit","meaning":"Degree. 温度=temperature. 程度=extent.","example_zh":"温度多高","example_en":"wēndù duō gāo — how high is the temperature?","etymology":"Compound"},{"id":66,"type":"character","hanzi":"家","pinyin":"jiā","tone":1,"english":"home / family","meaning":"Home, family, house. A pig 豕 under a roof — a household. 回家 = go home.","example_zh":"我回家了","example_en":"wǒ huí jiā le — I'm going home","etymology":"Pictographic"},{"id":67,"type":"character","hanzi":"电","pinyin":"diàn","tone":4,"english":"electricity / electric","meaning":"Electricity. 电话=telephone. 电脑=computer. 电视=TV.","example_zh":"电话来了","example_en":"diànhuà lái le — there's a phone call","etymology":"Pictographic"},{"id":68,"type":"character","hanzi":"力","pinyin":"lì","tone":4,"english":"strength / power","meaning":"Strength, power. 能力=ability. 努力=work hard.","example_zh":"努力一下","example_en":"nǔlì yīxià — try hard","etymology":"Pictographic"},{"id":69,"type":"character","hanzi":"里","pinyin":"lǐ","tone":3,"english":"inside / within","meaning":"Inside, within. 里面=inside. 心里=in one's heart. 这里=here.","example_zh":"在里面","example_en":"zài lǐmiàn — inside","etymology":"Ideographic"},{"id":70,"type":"character","hanzi":"如","pinyin":"rú","tone":2,"english":"like / as / if","meaning":"Like, as if. 如果=if. 如何=how. 如此=like this.","example_zh":"如果你来","example_en":"rúguǒ nǐ lái — if you come","etymology":"Compound"},{"id":71,"type":"character","hanzi":"水","pinyin":"shuǐ","tone":3,"english":"water","meaning":"Water. Looks like flowing water with a central stream and side ripples.","example_zh":"喝水","example_en":"hē shuǐ — drink water","etymology":"Pictographic"},{"id":72,"type":"character","hanzi":"化","pinyin":"huà","tone":4,"english":"using 进化 sense","meaning":"Evolution. 进化=evolution.","example_zh":"进化","example_en":"jìnhuà — evolution","etymology":"Compound"},{"id":73,"type":"character","hanzi":"高","pinyin":"gāo","tone":1,"english":"tall / high","meaning":"Tall, high. 高兴 (gāoxìng) = happy (lit. high spirits). 高中 = high school.","example_zh":"很高","example_en":"hěn gāo — very tall","etymology":"Pictographic"},{"id":74,"type":"character","hanzi":"自","pinyin":"zì","tone":4,"english":"self / from","meaning":"Self, from. 自己=oneself. 自然=natural. 自由=freedom.","example_zh":"自己做","example_en":"zìjǐ zuò — do it yourself","etymology":"Ideographic"},{"id":75,"type":"character","hanzi":"二","pinyin":"èr","tone":4,"english":"two","meaning":"The number two. Two horizontal strokes representing two units.","example_zh":"二月","example_en":"èr yuè — February","etymology":"Pictographic"},{"id":76,"type":"character","hanzi":"理","pinyin":"lǐ","tone":3,"english":"reason / to manage","meaning":"Reason, manage. 道理=reason. 管理=manage.","example_zh":"道理很清楚","example_en":"dàolǐ hěn qīngchu — the reasoning is clear","etymology":"Compound"},{"id":77,"type":"character","hanzi":"起","pinyin":"qǐ","tone":3,"english":"to rise / to start","meaning":"Rise, start. 起来=get up. 一起=together. 想起=recall.","example_zh":"一起来","example_en":"yīqǐ lái — come together","etymology":"Compound"},{"id":78,"type":"character","hanzi":"小","pinyin":"xiǎo","tone":3,"english":"small","meaning":"Small, little. Three strokes showing something tiny. Opposite of 大.","example_zh":"小心","example_en":"xiǎo xīn — be careful","etymology":"Pictographic"},{"id":79,"type":"character","hanzi":"物","pinyin":"wù","tone":4,"english":"thing","meaning":"Drug. 药物=drug.","example_zh":"药物治疗","example_en":"yàowù zhìliáo — drug treatment","etymology":"Compound"},{"id":80,"type":"character","hanzi":"现","pinyin":"xiàn","tone":4,"english":"now / appear / current","meaning":"Now, appear. 现在=now. 发现=discover. 现代=modern.","example_zh":"现在几点","example_en":"xiànzài jǐ diǎn — what time is it now?","etymology":"Compound"},{"id":81,"type":"character","hanzi":"实","pinyin":"shí","tone":2,"english":"real / solid / fact","meaning":"Real, solid. 其实=actually. 现实=reality. 实在=truly.","example_zh":"其实我不知道","example_en":"qíshí wǒ bù zhīdào — actually I don't know","etymology":"Compound"},{"id":82,"type":"character","hanzi":"加","pinyin":"jiā","tone":1,"english":"to add / to join","meaning":"Add, join. 参加=participate. 增加=increase.","example_zh":"参加活动","example_en":"cānjiā huódòng — join an activity","etymology":"Compound"},{"id":83,"type":"character","hanzi":"量","pinyin":"liàng","tone":4,"english":"quantity / measure","meaning":"Quantity. 数量=quantity. 质量=quality.","example_zh":"数量很多","example_en":"shùliàng hěn duō — large quantity","etymology":"Compound"},{"id":84,"type":"character","hanzi":"都","pinyin":"dōu","tone":1,"english":"all / both","meaning":"All, both, every. 大家都来了=everyone came. 都行=both are fine.","example_zh":"大家都来了","example_en":"dàjiā dōu lái le — everyone came","etymology":"Compound"},{"id":85,"type":"character","hanzi":"两","pinyin":"liǎng","tone":3,"english":"two (counting things)","meaning":"Two (of something). 两个=two of. Different from 二 (the number 2).","example_zh":"两个人","example_en":"liǎng gè rén — two people","etymology":"Ideographic"},{"id":86,"type":"character","hanzi":"体","pinyin":"tǐ","tone":3,"english":"body / form","meaning":"Body, form. 身体=body. 体育=sports.","example_zh":"身体很好","example_en":"shēntǐ hěn hǎo — good health","etymology":"Compound"},{"id":87,"type":"character","hanzi":"制","pinyin":"zhì","tone":4,"english":"to manufacture / system","meaning":"Manufacture, system. 制度=system.","example_zh":"制度很好","example_en":"zhìdù hěn hǎo — the system is good","etymology":"Compound"},{"id":88,"type":"character","hanzi":"机","pinyin":"jī","tone":1,"english":"machine / opportunity","meaning":"Machine, opportunity. 手机=phone. 飞机=airplane.","example_zh":"飞机票","example_en":"fēijī piào — airplane ticket","etymology":"Compound"},{"id":89,"type":"character","hanzi":"当","pinyin":"dāng","tone":1,"english":"when / to serve as","meaning":"When, serve as. 当时=at that time. 当然=of course.","example_zh":"当时不知道","example_en":"dāngshí bù zhīdào — didn't know then","etymology":"Compound"},{"id":90,"type":"character","hanzi":"使","pinyin":"shǐ","tone":3,"english":"to make / to use","meaning":"Make, use. 即使=even if. 使用=use.","example_zh":"使用说明","example_en":"shǐyòng shuōmíng — usage instructions","etymology":"Compound"},{"id":91,"type":"character","hanzi":"点","pinyin":"diǎn","tone":3,"english":"point / dot / a bit","meaning":"Point, dot, bit. 一点=a little. 几点=what time. 点头=nod.","example_zh":"一点点","example_en":"yīdiǎn diǎn — just a tiny bit","etymology":"Compound"},{"id":92,"type":"character","hanzi":"从","pinyin":"cóng","tone":2,"english":"from / since","meaning":"From, since. 从这里=from here. 从来=never (ever).","example_zh":"从中国来","example_en":"cóng Zhōngguó lái — come from China","etymology":"Compound"},{"id":93,"type":"character","hanzi":"业","pinyin":"yè","tone":4,"english":"business","meaning":"Business. 商业=commerce.","example_zh":"商业","example_en":"shāngyè — commerce/business","etymology":"Compound"},{"id":94,"type":"character","hanzi":"去","pinyin":"qù","tone":4,"english":"to go","meaning":"To go, to leave for. Opposite of 来 (lái, to come).","example_zh":"我去学校","example_en":"wǒ qù xuéxiào — I go to school","etymology":"Compound"},{"id":95,"type":"character","hanzi":"把","pinyin":"bǎ","tone":3,"english":"disposal marker / handle","meaning":"Disposal marker: 把书放下=put the book down. Handle of object.","example_zh":"把书放下","example_en":"bǎ shū fàng xià — put the book down","etymology":"Compound"},{"id":96,"type":"character","hanzi":"好","pinyin":"hǎo","tone":3,"english":"good","meaning":"Good, well, fine. A woman 女 next to a child 子 — a good family scene.","example_zh":"很好","example_en":"hěn hǎo — very good","etymology":"Compound"},{"id":97,"type":"character","hanzi":"应","pinyin":"yīng","tone":1,"english":"should / ought to","meaning" Compound"},{"id":106,"type":"character","hanzi":"前","pinyin":"qián","tone":2,"english":"front / before","meaning":"Front, before. 以前=before. 前面=in front. 三天前=3 days ago.","example_zh":"前面有学校","example_en":"qiánmiàn yǒu xuéxiào — school ahead","etymology":"Compound"},{"id":107,"type":"character","hanzi":"外","pinyin":"wài","tone":4,"english":"outside / foreign","meaning":"Outside, foreign. 外面=outside. 外国=foreign country.","example_zh":"外面很冷","example_en":"wàimiàn hěn lěng — it's cold outside","etymology":"Compound"},{"id":108,"type":"character","hanzi":"天","pinyin":"tiān","tone":1,"english":"sky / day","meaning":"Sky, heaven, day. A line above 大 (big person) — the sky above everything.","example_zh":"今天","example_en":"jīntiān — today","etymology":"Ideographic"},{"id":109,"type":"character","hanzi":"政","pinyin":"zhèng","tone":4,"english":"government/politics","meaning":"Government. 政府=government.","example_zh":"政府决定","example_en":"zhèngfǔ juédìng — government decides","etymology":"Compound"},{"id":110,"type":"character","hanzi":"日","pinyin":"rì","tone":4,"english":"sun / day","meaning":"Sun or day. Originally a circle with a dot for the sun. Now square with a middle line.","example_zh":"每日","example_en":"měi rì — every day","etymology":"Pictographic"},{"id":111,"type":"character","hanzi":"那","pinyin":"nà","tone":4,"english":"that","meaning":"That (far away). 那个=that one. Also means 'then/well then'.","example_zh":"那是谁","example_en":"nà shì shuí — who is that?","etymology":"Compound"},{"id":112,"type":"character","hanzi":"社","pinyin":"shè","tone":4,"english":"society / organization","meaning":"Society. 社会=society. 报社=newspaper.","example_zh":"社会发展","example_en":"shèhuì fāzhǎn — social development","etymology":"Compound"},{"id":113,"type":"character","hanzi":"义","pinyin":"yì","tone":4,"english":"righteousness","meaning":"Righteousness. 义务=duty.","example_zh":"正义","example_en":"zhèngyì — justice","etymology":"Compound"},{"id":114,"type":"character","hanzi":"事","pinyin":"s ,"pinyin":"xiàlái","tone":4,"english":"to come down","meaning":"To come down, to get down. 下 (down) + 来 (come). Opposite of 上来.","example_zh":"请下来","example_en":"qǐng xiàlái — please come down","etymology":"Compound","components":[42,21]},{"id":883,"type":"vocab","hanzi":"多年","pinyin":"duōnián","tone":1,"english":"many years","meaning":"Many years. 多 (many) + 年 (year). 多年来 = for many years, over the years.","example_zh":"多年来他一直努力","example_en":"duōnián lái tā yīzhí nǔlì — he has worked hard for many years","etymology":"Compound","components":[52,37]},{"id":884,"type":"vocab","hanzi":"所以","pinyin":"suǒyǐ","tone":3,"english":"therefore / so","meaning":"Therefore, so. 因为...所以...=because...so....","example_zh":"所以我来了","example_en":"suǒyǐ wǒ lái le — so I came","etymology":"Compound","components":[57,17]},{"id":885,"type":"vocab","hanzi":"自己","pinyin":"zìjǐ","tone":4,"english":"oneself / yourself","meaning":"Oneself. 自 (self) + 己 (self). 自己来=come yourself.","example_zh":"自己做饭","example_en":"zìjǐ zuòfàn — cook for yourself","etymology":"Compound","components":[74,74]},{"id":886,"type":"vocab","hanzi":"里面","pinyin":"lǐmiàn","tone":3,"english":"inside","meaning":"Inside, within. 里 (inside) + 面 (surface).","example_zh":"在里面等我","example_en":"zài lǐmiàn děng wǒ — wait for me inside","etymology":"Compound","components":[69,48]},{"id":887,"type":"vocab","hanzi":"上面","pinyin":"shàngmiàn","tone":4,"english":"above / on top","meaning":"Above, on top. 上 (up) + 面 (surface).","example_zh":"书在上面","example_en":"shū zài shàngmiàn — the book is on top","etymology":"Compound","components":[13,48]},{"id":888,"type":"vocab","hanzi":"下面","pinyin":"xiàmiàn","tone":4,"english":"below / underneath","meaning":"Below, underneath. 下 (down) + 面 (surface).","example_zh":"请看下面","example_en":"qǐng kàn xiàmiàn — please look below","etymology":"Compound","components":[42,48]},{"id":889,"type":"vocab","hanzi":"方法","pinyin":"fāngfǎ","tone":1,"english":"method / way","meaning":"Method, approach. 方 (direction) + 法 (law/method).","example_zh":"这个方法很好","example_en":"zhège fāngfǎ hěn hǎo — this method is very good","etymology":"Compound","components":[50,22]},{"id":890,"type":"vocab","hanzi":"过来","pinyin":"guòlai","tone":4,"english":"to come over","meaning":"Come over to this side. 过 (cross) + 来 (come). Directional complement.","example_zh":"你过来一下","example_en":"nǐ guòlai yīxià — come over here","etymology":"Compound","components":[43,21]},{"id":891,"type":"vocab","hanzi":"能力","pinyin":"nénglì","tone":2,"english":"ability / capability","meaning":"Ability, capability. 能 (can) + 力 (strength).","example_zh":"他很有能力","example_en":"tā hěn yǒu nénglì — he is very capable","etymology":"Compound","components":[41,41]},{"id":892,"type":"vocab","hanzi":"等一下","pinyin":"děng yīxià","tone":3,"english":"wait a moment","meaning":"Wait a moment. 等 (wait) + 一 (one) + 下 (moment). Very common request.","example_zh":"请等一下","example_en":"qǐng děng yīxià — please wait a moment","etymology":"Compound","components":[64,2]},{"id":893,"type":"vocab","hanzi":"自然","pinyin":"zìrán","tone":4,"english":"natural / naturally","meaning":"Natural, naturally. 自 (self) + 然 (so/thus). 大自然=nature.","example_zh":"这很自然","example_en":"zhè hěn zìrán — this is very natural","etymology":"Compound","components":[74,74]},{"id":894,"type":"vocab","hanzi":"面对","pinyin":"miànduì","tone":4,"english":"to face / to confront","meaning":"To face, confront. 面 (face) + 对 (toward).","example_zh":"面对困难","example_en":"miànduì kùnnán — face difficulties","etymology":"Compound","components":[48,31]},{"id":895,"type":"vocab","hanzi":"用法","pinyin":"yòngfǎ","tone":4,"english":"usage / how to use","meaning":"Usage, how to use something. 用 (use) + 法 (method).","example_zh":"这个词的用法","example_en":"zhège cí de yòngfǎ — the usage of this word","etymology":"Compound","components":[22,50]},{"id":896,"type":"vocab","hanzi":"地方","pinyin":"dìfang","tone":4,"english":"place / location","meaning":"Place. 地+方.","example_zh":"这个地方很好","example_en":"zhège dìfang hěn hǎo — this place is great","etymology":"Compound","components":[1,50]},{"id":897,"type":"vocab","hanzi":"一起","pinyin":"yīqǐ","tone":1,"english":"together","meaning":"Together. 一+起.","example_zh":"我们一起去","example_en":"wǒmen yīqǐ qù — let's go together","etymology":"Compound","components":[2,77]},{"id":898,"type":"vocab","hanzi":"起来","pinyin":"qǐlai","tone":3,"english":"to get up / rise","meaning":"Get up. 起+来.","example_zh":"起来吧","example_en":"qǐlai ba — get up","etymology":"Compound","components":[77,21]},{"id":899,"type":"vocab","hanzi":"可能","pinyin":"kěnéng","tone":3,"english":"possible / maybe","meaning":"Maybe. 可+能.","example_zh":"可能他来","example_en":"kěnéng tā lái — maybe he'll come","etymology":"Compound","components":[34,41]},{"id":900,"type":"vocab","hanzi":"发现","pinyin":"fāxiàn","tone":1,"english":"to discover","meaning":"Discover. 发+现.","example_zh":"我发现了","example_en":"wǒ fāxiàn le — I discovered it","etymology":"Compound","components":[36,80]},{"id":901,"type":"vocab","hanzi":"现在","pinyin":"xiànzài","tone":4,"english":"now / at present","meaning":"Now. 现+在.","example_zh":"现在几点","example_en":"xiànzài jǐ diǎn — what time is it now?","etymology":"Compound","components":[80,40]},{"id":902,"type":"vocab","hanzi":"以后","pinyin":"yǐhòu","tone":3,"english":"after / in the future","meaning":"After, in the future. 以+后.","example_zh":"以后再说","example_en":"yǐhòu zài shuō — let's talk about it later","etymology":"Compound","components":[17,51]},{"id":903,"type":"vocab","hanzi":"进来","pinyin":"jìnlai","tone":4,"english":"to come in","meaning":"Come in. 进+来.","example_zh":"请进来","example_en":"qǐng jìnlai — please come in","etymology":"Compound","components":[62,21]},{"id":904,"type":"vocab","hanzi":"旅行","pinyin":"lǚxíng","tone":3,"english":"to travel","meaning":"Travel. 旅+行.","example_zh":"我喜欢旅行","example_en":"wǒ xǐhuān lǚxíng — I love to travel","etymology":"Compound","components":[54,54]},{"id":905,"type":"vocab","hanzi":"努力","pinyin":"nǔlì","tone":3,"english":"to work hard / effort","meaning":"Work hard. 努+力.","example_zh":"努力工作","example_en":"nǔlì gōngzuò — work hard","etymology":"Compound","components":[68,68]},{"id":906,"type":"vocab","hanzi":"行不行","pinyin":"xíng bu xíng","tone":2,"english":"can or not / is it okay","meaning":"Is it okay? 行+不+行.","example_zh":"行不行","example_en":"xíng bu xíng — is it okay?","etymology":"Compound","components":[54,54]},{"id":907,"type":"vocab","hanzi":"自由","pinyin":"zìyóu","tone":4,"english":"freedom / free","meaning":"Freedom. 自+由.","example_zh":"自由很重要","example_en":"zìyóu hěn zhòngyào — freedom is important","etymology":"Compound","components":[74,74]},{"id":908,"type":"vocab","hanzi":"进步","pinyin":"jìnbù","tone":4,"english":"progress","meaning":"Progress. 进+步.","example_zh":"有很大进步","example_en":"yǒu hěn dà jìnbù — great progress","etymology":"Compound","components":[62,62]},{"id":909,"type":"vocab","hanzi":"一步一步","pinyin":"yī bù yī bù","tone":1,"english":"step by step","meaning":"Step by step.","example_zh":"一步一步来","example_en":"yī bù yī bù lái — step by step","etymology":"Compound","components":[2,62]},{"id":910,"type":"vocab","hanzi":"各种","pinyin":"gè zhǒng","tone":4,"english":"various kinds of","meaning":"Various. 各+种.","example_zh":"各种方法","example_en":"gè zhǒng fāngfǎ — various methods","etymology":"Compound","components":[47,47]},{"id":911,"type":"vocab","hanzi":"日本","pinyin":"Rìběn","tone":4,"english":"Japan","meaning":"Japan — origin of the sun. 日 (sun) + 本 (origin/root). A great mnemonic.","example_zh":"日本很漂亮","example_en":"Rìběn hěn piàoliang — Japan is very beautiful","etymology":"Compound","components":[110]},{"id":912,"type":"vocab","hanzi":"日文","pinyin":"Rìwén","tone":4,"english":"Japanese language","meaning":"The Japanese language. 日 (Japan) + 文 (language/writing).","example_zh":"我学日文","example_en":"wǒ xué Rìwén — I study Japanese","etymology":"Compound","components":[110]},{"id":913,"type":"vocab","hanzi":"今天","pinyin":"jīntiān","tone":1,"english":"today","meaning":"Today. 今 (now/present) + 天 (day/sky). One of the first time words you'll learn.","example_zh":"今天天气很好","example_en":"jīntiān tiānqì hěn hǎo — the weather is great today","etymology":"Compound","components":[108]},{"id":914,"type":"vocab","hanzi":"天天","pinyin":"tiāntiān","tone":1,"english":"every day","meaning":"Every day. Repeating 天 (day) creates 'every day' — a common Chinese pattern.","example_zh":"我天天学中文","example_en":"wǒ tiāntiān xué Zhōngwén — I study Chinese every day","etymology":"Compound","components":[108]},{"id":915,"type":"vocab","hanzi":"好人","pinyin":"hǎorén","tone":3,"english":"good person","meaning":"A good person, kind person. 好 (good) + 人 (person). Also used sarcastically sometimes.","example_zh":"他是个好人","example_en":"tā shì gè hǎorén — he is a good person","etymology":"Compound","components":[96,8]},{"id":916,"type":"vocab","hanzi":"不好","pinyin":"bù hǎo","tone":4,"english":"not good / bad","meaning":"Not good, bad. 不 (not) + 好 (good). Simple negation. Very common in daily speech.","example_zh":"这个不好","example_en":"zhège bù hǎo — this is not good","etymology":"Compound","components":[4,96]},{"id":917,"type":"vocab","hanzi":"去年","pinyin":"qùnián","tone":4,"english":"last year","meaning":"Last year. 去 (go/past) + 年 (year). A very common time expression.","example_zh":"去年我在日本","example_en":"qùnián wǒ zài Rìběn — last year I was in Japan","etymology":"Compound","components":[94,37]},{"id":918,"type":"vocab","hanzi":"上去","pinyin":"shàngqù","tone":4,"english":"to go up","meaning":"To go up, to head up. 上 (up) + 去 (go). Similar to 上来 but away from speaker.","example_zh":"他上去了","example_en":"tā shàngqù le — he went up","etymology":"Compound","components":[13,94]},{"id":919,"type":"vocab","hanzi":"下去","pinyin":"xiàqù","tone":4,"english":"to go down / to continue","meaning":"To go down; to continue doing something. 下 (down) + 去 (go). Context determines meaning.","example_zh":"继续下去","example_en":"jìxù xiàqù — continue on, keep going","etymology":"Compound","components":[42,94]},{"id":920,"type":"vocab","hanzi":"那个","pinyin":"nàge","tone":4,"english":"that one","meaning":"That one. 那 (that) + 个 (measure word).","example_zh":"那个是什么","example_en":"nàge shì shénme — what is that?","etymology":"Compound","components":[111,14]},{"id":921,"type":"vocab","hanzi":"开始","pinyin":"kāishǐ","tone":1,"english":"to begin / start","meaning":"Begin, start. 开 (open) + 始 (begin). 开始了=it has begun.","example_zh":"我们开始吧","example_en":"wǒmen kāishǐ ba — let's begin","etymology":"Compound","components":[98,98]},{"id":922,"type":"vocab","hanzi":"还是","pinyin":"háishi","tone":2,"english":"or / still is","meaning":"Or (in questions); still is. 还 + 是. 你去还是他去=you or him?","example_zh":"你去还是他去","example_en":"nǐ qù háishi tā qù — are you going or is he?","etymology":"Compound","components":[100,3]},{"id":923,"type":"vocab","hanzi":"事情","pinyin":"shìqíng","tone":4,"english":"matter / thing / affair","meaning":"Matter, thing. 事+情.","example_zh":"这件事情","example_en":"zhè jiàn shìqíng — this matter","etymology":"Compound","components":[114,114]},{"id":924,"type":"vocab","hanzi":"两个","pinyin":"liǎng gè","tone":3,"english":"two of something","meaning":"Two. 两+个.","example_zh":"两个人","example_en":"liǎng gè rén — two people","etymology":"Compound","components":[85,14]},{"id":925,"type":"vocab","hanzi":"其实","pinyin":"qíshí","tone":2,"english":"actually / in fact","meaning":"Actually. 其+实.","example_zh":"其实不知道","example_en":"qíshí bù zhīdào — actually don't know","etymology":"Compound","components":[103,81]},{"id":926,"type":"vocab","hanzi":"然后","pinyin":"ránhòu","tone":2,"english":"then / after that","meaning":"Then, after that. 然+后.","example_zh":"然后他走了","example_en":"ránhòu tā zǒu le — then he left","etymology":"Compound","components":[105,51]},{"id":927,"type":"vocab","hanzi":"当然","pinyin":"dāngrán","tone":1,"english":"of course / naturally","meaning":"Of course. 当+然.","example_zh":"当然可以","example_en":"dāngrán kěyǐ — of course","etymology":"Compound","compon

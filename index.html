<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>汉字 Hanzi SRS</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c0392b"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap');

    :root{
      --bg:#0a0608;
      --surface:#110b0d;
      --surface2:#180f12;
      --border:#ffffff0d;
      --border2:#ffffff18;
      --text:#f0eaeb;
      --muted:#7a6b6e;
      --red:#c0392b;
      --red-bright:#e74c3c;
      --red-glow:#c0392b33;
      --gold:#d4960a;
      --gold-bright:#f0b429;
      --green:#16a34a;
      --blue:#2563eb;
      /* Tone colors */
      --tone1:#e74c3c;
      --tone2:#2980b9;
      --tone3:#27ae60;
      --tone4:#8e44ad;
      --tone0:#888;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* Background: subtle Chinese pattern */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        radial-gradient(circle at 20% 20%, #c0392b08 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #d4960a06 0%, transparent 50%);
      opacity:1;
    }
    body::after{
      content:'龙凤山水';
      position:fixed;right:-60px;top:50%;transform:translateY(-50%);
      font-family:'Noto Serif SC',serif;
      font-size:220px;font-weight:700;
      color:#ffffff03;
      writing-mode:vertical-rl;
      pointer-events:none;z-index:0;
      letter-spacing:10px;
      line-height:1;
    }

    #app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:2rem 2.5rem}

    /* NAV */
    nav{display:flex;gap:4px;margin-bottom:2rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px}
    nav button{flex:1;background:none;border:none;color:var(--muted);font-size:15px;font-weight:500;cursor:pointer;padding:10px 12px;border-radius:10px;transition:all .16s;font-family:inherit;letter-spacing:.01em}
    nav button:hover{color:var(--text);background:#ffffff07}
    nav button.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 4px #00000050}

    h2{font-size:26px;font-weight:700;margin-bottom:5px;letter-spacing:-.025em}
    p.sub{color:var(--muted);font-size:13px;margin-bottom:1.5rem;font-weight:400}
    button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:10px;border:1px solid var(--border);padding:11px;transition:all .14s;font-weight:500}
    button:disabled{opacity:0.3;cursor:not-allowed}
    button:not(:disabled):active{transform:scale(.975)}

    /* METRICS */
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:1.5rem}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:border-color .18s}
    .metric:hover{border-color:var(--border2)}
    .metric .label{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
    .metric .value{font-size:32px;font-weight:700;letter-spacing:-.025em;line-height:1}

    /* BUTTONS */
    .btn-row{display:flex;gap:14px;margin-bottom:1.5rem}
    .btn-review{flex:1;background:linear-gradient(135deg,#991b1b,#c0392b);color:#fff;border:none;font-size:16px;font-weight:700;padding:18px;border-radius:14px;box-shadow:0 2px 16px #c0392b28;letter-spacing:-.01em}
    .btn-review:not(:disabled):hover{filter:brightness(1.1);box-shadow:0 4px 24px #c0392b44}
    .btn-lesson{flex:1;background:linear-gradient(135deg,#92400e,#d4960a);color:#fff;border:none;font-size:16px;font-weight:700;padding:18px;border-radius:14px;box-shadow:0 2px 16px #d4960a28;letter-spacing:-.01em}
    .btn-lesson:not(:disabled):hover{filter:brightness(1.1);box-shadow:0 4px 24px #d4960a44}
    .btn-secondary{background:var(--surface2);color:var(--text);width:100%;margin-top:10px;border:1px solid var(--border2)}
    .btn-secondary:hover{background:#1a1015;border-color:#ffffff22}
    .btn-back{background:none;border:none;color:var(--muted);font-size:13px;padding:0;font-weight:500}
    .btn-back:hover{color:var(--text)}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1rem}
    .card-label{font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}

    /* LEVEL BAR */
    .level-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
    .level-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .level-title{font-size:14px;font-weight:700;letter-spacing:-.015em}
    .level-pct{font-size:11.5px;color:var(--muted);font-weight:500}
    .level-bar{height:8px;background:#ffffff09;border-radius:99px;overflow:hidden}
    .level-bar-fill{height:100%;background:linear-gradient(90deg,#991b1b,#f0b429);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

    /* PILLS */
    .stage-pills{display:flex;gap:6px;flex-wrap:wrap}
    .pill{display:flex;align-items:center;gap:6px;background:#ffffff06;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block}

    /* SESSION */
    .session-wrap{max-width:640px;margin:0 auto;padding:0 1rem}
    .session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .session-progress{height:3px;background:#ffffff07;border-radius:99px;margin-bottom:2.5rem;overflow:hidden}
    .session-progress-fill{height:100%;background:linear-gradient(90deg,#c0392b,#d4960a);border-radius:99px;transition:width .35s}
    .stage-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:.03em}
    .direction-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;text-align:center}

    /* THE BIG HANZI */
    .big-hanzi{
      font-family:'Noto Serif SC',serif;
      font-size:110px;font-weight:700;
      margin:1rem 0 .25rem;text-align:center;
      line-height:1;
      text-shadow:0 4px 40px #c0392b22;
    }
    .big-pinyin{
      font-family:'DM Mono',monospace;
      font-size:18px;font-weight:500;
      text-align:center;
      margin-bottom:.5rem;
      letter-spacing:.05em;
    }
    .prompt-label{font-size:13px;color:var(--muted);margin-bottom:1.75rem;text-align:center;font-weight:500}

    #answer-input{width:100%;padding:14px 16px;font-size:17px;border-radius:12px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;border:1.5px solid var(--border2);transition:border-color .14s,box-shadow .14s;font-weight:500}
    #answer-input:focus{border-color:#c0392b99;box-shadow:0 0 0 3px var(--red-glow)}
    #answer-input.correct{border-color:#16a34a;box-shadow:0 0 0 3px #16a34a1e}
    #answer-input.wrong{border-color:#dc2626;box-shadow:0 0 0 3px #dc26261e}

    .feedback{margin:.75rem 0;padding:12px 16px;border-radius:10px;font-size:13.5px;text-align:center;font-weight:600}
    .feedback.correct{background:#14532d1a;color:#4ade80;border:1px solid #16a34a2e}
    .feedback.wrong{background:#7f1d1d1a;color:#f87171;border:1px solid #dc26262e}

    .check-btn{width:100%;margin-top:10px;color:#fff;border:none;font-size:15px;font-weight:700;padding:15px;border-radius:12px;letter-spacing:-.01em}

    .stats-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 0;margin-top:1.25rem;display:flex;font-size:13px;font-weight:700}
    .stats-bar span{flex:1;text-align:center;padding:2px 0}
    .stats-bar span:nth-child(1){color:#4ade80}
    .stats-bar span:nth-child(2){color:#f87171;border-left:1px solid var(--border);border-right:1px solid var(--border)}
    .stats-bar span:nth-child(3){color:var(--muted)}

    /* DONE / LEVELUP */
    .done-screen{text-align:center;padding:4rem 1.5rem}
    .done-screen .emoji{font-size:56px;margin-bottom:1.25rem}
    .done-screen h2{font-size:22px;letter-spacing:-.02em}
    .levelup-screen{text-align:center;padding:4rem 1.5rem}
    .levelup-num{font-size:100px;font-weight:800;background:linear-gradient(135deg,#c0392b,#e74c3c,#f0b429);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:1rem 0;letter-spacing:-.05em}

    /* BROWSE */
    .browse-level-section{margin-bottom:2rem}
    .browse-level-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .browse-level-badge{background:linear-gradient(135deg,#7f1d1d,#c0392b);color:#fff;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.03em}
    .browse-level-title{font-size:13px;font-weight:500;color:var(--muted)}
    .browse-level-lock{font-size:12px;color:#374151;margin-left:auto}
    .browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px}
    .browse-card{border-radius:10px;padding:9px 6px;text-align:center;cursor:pointer;border:1px solid transparent;transition:transform .12s,box-shadow .12s}
    .browse-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px #00000050}
    .browse-card .hanzi-sm{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;margin-bottom:2px;line-height:1.2}
    .browse-card .english-sm{font-size:10px;opacity:.6;font-weight:500}
    .browse-card.locked{background:#110b0d;border-color:#ffffff06;opacity:.3;cursor:default}
    .browse-card.locked:hover{transform:none;box-shadow:none}

    /* STAGE UP POPUP */
    .stage-popup{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
      z-index:300;pointer-events:none;
      display:flex;flex-direction:column;align-items:center;gap:6px;
      opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);
    }
    .stage-popup.show{opacity:1;transform:translate(-50%,-60%) scale(1)}
    .stage-popup.hide{opacity:0;transform:translate(-50%,-70%) scale(0.9);transition:all .3s ease}
    .stage-popup-badge{
      padding:10px 24px;border-radius:99px;
      font-size:18px;font-weight:800;letter-spacing:.02em;
      box-shadow:0 8px 32px #00000060;
      white-space:nowrap;
    }
    .stage-popup-label{font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.1em;opacity:.8;}

    /* INFO PANEL */
    .info-panel{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:#110b0d;border-top:1px solid var(--border2);
      border-radius:20px 20px 0 0;
      box-shadow:0 -8px 40px #00000080;
      max-height:75vh;overflow-y:auto;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    }
    .info-panel.open{transform:translateY(0)}
    .info-panel-tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;background:#110b0d;z-index:1;border-radius:20px 20px 0 0;overflow:hidden}
    .info-panel-tab{flex:1;padding:13px 8px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:0;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.01em}
    .info-panel-tab.active{color:var(--text);border-bottom-color:var(--red-bright)}
    .info-panel-tab:hover{color:var(--text);background:#ffffff05}
    .info-panel-body{padding:1.25rem 1.5rem 2rem}
    .info-content{font-size:14px;line-height:1.7;color:#c4b8ba}
    .info-content b{color:var(--text);font-weight:600}
    .info-toggle-btn{
      display:flex;align-items:center;justify-content:center;gap:6px;
      width:100%;margin-top:10px;padding:11px;
      background:#ffffff07;border:1px solid var(--border);
      border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;
      cursor:pointer;transition:all .15s;
    }
    .info-toggle-btn:hover{background:#ffffff0f;color:var(--text)}
    .info-toggle-btn.panel-open{color:var(--red-bright);border-color:var(--red-bright)44;background:var(--red-glow)}

    .loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
    @keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}

    /* LESSON PICKER */
    .picker-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
    .picker-word{
      padding:7px 12px;border-radius:8px;font-size:16px;font-weight:600;
      font-family:'Noto Serif SC',serif;
      cursor:pointer;border:1.5px solid transparent;
      background:#1a0f12;color:var(--muted);
      transition:all .14s;user-select:none;
    }
    .picker-word:hover{border-color:var(--border2);color:var(--text)}
    .picker-word.selected{background:var(--red-glow);border-color:var(--red-bright);color:var(--red-bright)}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:#00000090;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;animation:fadein .14s}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .modal{background:#140c0f;border-radius:20px;padding:1.75rem;max-width:390px;width:100%;border:1px solid var(--border2);box-shadow:0 32px 80px #00000099;animation:slideup .16s cubic-bezier(.4,0,.2,1)}
    @keyframes slideup{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-hanzi{font-family:'Noto Serif SC',serif;font-size:72px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1;text-shadow:0 2px 20px #c0392b33}
    .modal-pinyin{font-family:'DM Mono',monospace;font-size:16px;text-align:center;margin-bottom:4px;letter-spacing:.05em}
    .modal-english{font-size:19px;color:#9ca3af;text-align:center;margin-bottom:1.25rem;font-weight:600}
    .modal-row{display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border);font-weight:500}
    .modal-row:last-child{border-bottom:none}
    .modal-row span:first-child{color:var(--muted)}
    .modal-close{width:100%;margin-top:1.1rem;background:#1a0f12;color:var(--text);border:1px solid var(--border2);font-weight:600}

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      15%{transform:translateX(-6px)}30%{transform:translateX(6px)}
      45%{transform:translateX(-5px)}60%{transform:translateX(5px)}
      75%{transform:translateX(-3px)}90%{transform:translateX(3px)}
    }
    .shake{animation:shake .4s ease}
    .near-miss-hint{
      margin:.5rem 0;padding:9px 14px;border-radius:8px;
      background:#78350f22;color:#fbbf24;border:1px solid #78350f44;
      font-size:13px;font-weight:500;text-align:center;
    }

    /* TONE indicator dot */
    .tone-dot{
      display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;
    }
  </style>
</head>
<body>

<!-- Chinese flag corner badge -->
<div style="position:fixed;top:20px;left:24px;z-index:50;width:96px;height:64px;border-radius:10px;overflow:hidden;box-shadow:0 6px 24px #00000070;opacity:0.92;background:#DE2910;display:flex;align-items:center;justify-content:center;">
  <div style="position:absolute;top:8px;left:10px;font-size:22px;line-height:1">⭐</div>
  <div style="position:absolute;top:6px;left:28px;font-size:10px;line-height:1.6;display:flex;flex-direction:column;gap:2px">
    <span style="transform:rotate(30deg);display:inline-block">⭐</span>
    <span style="transform:rotate(20deg);display:inline-block">⭐</span>
    <span style="transform:rotate(-20deg);display:inline-block">⭐</span>
    <span style="transform:rotate(-30deg);display:inline-block">⭐</span>
  </div>
</div>

<div id="app"><p style="text-align:center;padding:3rem;color:#888">Loading...</p></div>

<script>
const SRS_STAGES   = ["Apprentice 1","Apprentice 2","Apprentice 3","Apprentice 4","Guru 1","Guru 2","Master","Enlightened","Burned"];
const SRS_INTERVALS= [4,8,24,72,168,336,730,2160,Infinity];
const STAGE_COLORS = {
  "Apprentice 1":"#c0392b","Apprentice 2":"#c0392b","Apprentice 3":"#c0392b","Apprentice 4":"#c0392b",
  "Guru 1":"#d4960a","Guru 2":"#d4960a",
  "Master":"#2563eb","Enlightened":"#0ea5e9","Burned":"#16a34a"
};
const WORDS_PER_LEVEL = 83;
const MAX_LEVEL = 60;
const GURU_THRESHOLD = 0.9;
const HOUR_MS = 3600000;
const TONE_COLORS = ["#888","#e74c3c","#2980b9","#27ae60","#8e44ad"];

// ── SETTINGS ───────────────────────────────────────────────────────────────
let settings = {
  lessonsPerDay: 15,
  reviewOrder: "shuffle",
  autoPlay: true,
  slowAudio: false,
  showPinyinOnReview: false,
};
function loadSettings(){
  const s=localStorage.getItem("hanzi-settings");
  if(s) settings={...settings,...JSON.parse(s)};
}
function saveSettings(){
  localStorage.setItem("hanzi-settings",JSON.stringify(settings));
}

let VOCAB=[], progress={}, currentLevel=1;
let screen="dashboard", selectedWord=null;
let reviewQueue=[], reviewIdx=0;
let lessonQueue=[], lessonIdx=0, lessonPhase="learn";
let input="", feedback=null;
let sessionCorrect=0, sessionTotal=0, sessionDone=false, showLevelUp=false;
let sessionStartTime=null;
let nearMissActive=false;
let infoPanelOpen=false, infoPanelTab="meaning", infoPanelWord=null;
let infoPanelCache={};
let pickerSelected=new Set();
let browseSearch="";

function save(){
  localStorage.setItem("hanzi-progress",JSON.stringify(progress));
  localStorage.setItem("hanzi-level",currentLevel);
}
function load(){
  loadSettings();
  const p=localStorage.getItem("hanzi-progress"); if(p) progress=JSON.parse(p);
  currentLevel=parseInt(localStorage.getItem("hanzi-level")||"1");
}

// ── TONE COLOR HELPER ──────────────────────────────────────────────────────
function toneColor(tone){
  return TONE_COLORS[tone]||TONE_COLORS[0];
}
function coloredPinyin(word){
  const col = toneColor(word.tone||0);
  return `<span style="color:${col}">${word.pinyin}</span>`;
}

// ── AUDIO ──────────────────────────────────────────────────────────────────
function speak(text, lang="zh-CN"){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = settings.slowAudio ? 0.6 : 0.85;
  const voices = speechSynthesis.getVoices();
  const chinese = voices.find(v=>v.lang==="zh-CN")||voices.find(v=>v.lang.startsWith("zh"));
  if(chinese) u.voice = chinese;
  speechSynthesis.speak(u);
}
function speakBtn(text, size="15px"){
  return `<button onclick="event.stopPropagation();speak('${text.replace(/'/g,"\\'")}')"
    style="background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--muted);font-size:${size};cursor:pointer;transition:all .14s;line-height:1"
    title="Play audio">🔊</button>`;
}

// ── PROGRESS HELPERS ───────────────────────────────────────────────────────
function initProgress(){
  VOCAB.forEach(w=>{if(!progress[w.id]) progress[w.id]={stage:0,nextReview:Date.now(),lessonDone:false};});
}
function wordsForLevel(lvl){ return VOCAB.slice((lvl-1)*WORDS_PER_LEVEL, lvl*WORDS_PER_LEVEL); }
function guruCount(lvl){ return wordsForLevel(lvl).filter(w=>progress[w.id]?.lessonDone&&progress[w.id]?.stage>=4).length; }
function levelProgress(lvl){ const w=wordsForLevel(lvl); return w.length?guruCount(lvl)/w.length:0; }
function checkLevelUp(){
  if(currentLevel>=MAX_LEVEL) return false;
  if(wordsForLevel(currentLevel+1).length===0) return false;
  if(levelProgress(currentLevel)>=GURU_THRESHOLD){ currentLevel++; save(); return true; }
  return false;
}
function lessonsToday(){
  const today=new Date().toDateString();
  const last=localStorage.getItem("hanzi-lastday");
  return last===today?parseInt(localStorage.getItem("hanzi-lessonstoday")||"0"):0;
}
function availableLessons(){
  const rem=settings.lessonsPerDay-lessonsToday();
  if(rem<=0) return [];
  return wordsForLevel(currentLevel).filter(w=>!progress[w.id]?.lessonDone).slice(0,rem);
}
function dueReviews(){
  let due=VOCAB.filter(w=>progress[w.id]?.lessonDone&&progress[w.id]?.nextReview<=Date.now());
  if(settings.reviewOrder==="level") due.sort((a,b)=>a.id-b.id);
  else if(settings.reviewOrder==="stage") due.sort((a,b)=>progress[a.id].stage-progress[b.id].stage);
  return due;
}
function stageColor(w){ const p=progress[w.id]; if(!p?.lessonDone) return "#333"; return STAGE_COLORS[SRS_STAGES[p.stage]]||"#888"; }
function stageCounts(){ const c={}; SRS_STAGES.forEach(s=>c[s]=0); VOCAB.forEach(w=>{if(progress[w.id]?.lessonDone)c[SRS_STAGES[progress[w.id].stage]]++;}); return c; }

// ── ANSWER CHECKING ────────────────────────────────────────────────────────
function normalize(s){ return s.trim().toLowerCase().replace(/[^a-z0-9 \/\-]/g,"").replace(/\s+/g," ").trim(); }
function getAcceptedAnswers(english){
  let raw = english.replace(/\([^)]*\)/g," ");
  return raw.split("/").map(x=>normalize(x)).filter(x=>x.length>0);
}
function similar(a,b){
  a=normalize(a);
  const accepted=getAcceptedAnswers(b);
  if(accepted.some(x=>x===a)) return true;
  return accepted.some(x=>{
    if(Math.abs(a.length-x.length)>2) return false;
    let d=0; for(let i=0;i<Math.max(a.length,x.length);i++) if(a[i]!==x[i]) d++;
    return d<=1;
  });
}

// Check hanzi answer — must match exactly (or close)
function similarHanzi(a, b){
  return a.trim()===b.trim();
}

function editDistance(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function isNearMiss(input, expected){
  const a=normalize(input);
  const accepted=getAcceptedAnswers(expected);
  if(accepted.some(x=>x===a)) return false;
  return accepted.some(x=>{ const dist=editDistance(a,x); return dist<=(x.length<=5?1:2); });
}

// ── USER SYNONYMS ──────────────────────────────────────────────────────────
function getSynonyms(wordId){
  return JSON.parse(localStorage.getItem(`hanzi-syn-${wordId}`)||"[]");
}
function addSynonym(wordId, syn){
  syn=syn.trim().toLowerCase();
  if(!syn) return;
  const syns=getSynonyms(wordId);
  if(!syns.includes(syn)){ syns.push(syn); localStorage.setItem(`hanzi-syn-${wordId}`,JSON.stringify(syns)); }
}
function removeSynonym(wordId, syn){
  const syns=getSynonyms(wordId).filter(s=>s!==syn);
  localStorage.setItem(`hanzi-syn-${wordId}`,JSON.stringify(syns));
}
function similarWithSynonyms(a, b, wordId, type){
  if(type==="hanzi") return similarHanzi(a,b);
  if(similar(a,b)) return true;
  const an=normalize(a);
  return getSynonyms(wordId).some(s=>s===an);
}

// ── STREAK / TIME ──────────────────────────────────────────────────────────
function getStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem("hanzi-streak-date");
  const count=parseInt(localStorage.getItem("hanzi-streak")||"0");
  if(last===today) return count;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(last===yesterday) return count;
  return 0;
}
function updateStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem("hanzi-streak-date");
  const count=parseInt(localStorage.getItem("hanzi-streak")||"0");
  if(last===today) return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const newCount=last===yesterday?count+1:1;
  localStorage.setItem("hanzi-streak",newCount);
  localStorage.setItem("hanzi-streak-date",today);
}
function addStudyTime(ms){
  const today=new Date().toDateString();
  const last=localStorage.getItem("hanzi-time-date");
  const total=last===today?parseInt(localStorage.getItem("hanzi-time-today")||"0"):0;
  localStorage.setItem("hanzi-time-date",today);
  localStorage.setItem("hanzi-time-today",total+ms);
}
function formatTime(ms){
  const m=Math.floor(ms/60000),h=Math.floor(m/60);
  if(h>0) return `${h}h ${m%60}m`;
  return `${m}m`;
}
function recordAccuracy(wordId, correct){
  const key=`hanzi-acc-${wordId}`;
  const data=JSON.parse(localStorage.getItem(key)||'{"c":0,"t":0}');
  data.t++; if(correct) data.c++;
  localStorage.setItem(key,JSON.stringify(data));
}
function getAccuracy(wordId){
  const data=JSON.parse(localStorage.getItem(`hanzi-acc-${wordId}`)||'{"c":0,"t":0}');
  return data.t===0?null:Math.round(data.c/data.t*100);
}

// ── UPCOMING REVIEWS ───────────────────────────────────────────────────────
function getUpcomingReviews(){
  const now=Date.now(), hours=Array(24).fill(0);
  VOCAB.forEach(w=>{
    const p=progress[w.id];
    if(!p?.lessonDone||p.nextReview<=now) return;
    const h=Math.ceil((p.nextReview-now)/HOUR_MS);
    if(h>0&&h<=24) hours[h-1]++;
  });
  return hours;
}
function getDailyForecast(){
  const now=Date.now(), days=[];
  for(let d=0;d<7;d++){
    const start=now+d*86400000, end=start+86400000;
    let count=0;
    VOCAB.forEach(w=>{
      const p=progress[w.id];
      if(!p?.lessonDone) return;
      if(p.nextReview>now&&p.nextReview>=start&&p.nextReview<end) count++;
    });
    const date=new Date(start);
    const label=d===0?"Today":d===1?"Tomorrow":date.toLocaleDateString("en-US",{weekday:"short"});
    days.push({label,count});
  }
  let running=dueReviews().length;
  days.forEach(d=>{ running+=d.count; d.total=running; });
  return days;
}

// ── SESSION FLOW ───────────────────────────────────────────────────────────
function finishSession(){
  if(sessionStartTime){ addStudyTime(Date.now()-sessionStartTime); updateStreak(); sessionStartTime=null; }
}

function startLessons(){
  lessonQueue=availableLessons(); if(!lessonQueue.length) return;
  lessonIdx=0; lessonPhase="learn"; input=""; feedback=null;
  sessionCorrect=0; sessionTotal=0; sessionDone=false; showLevelUp=false;
  sessionStartTime=Date.now();
  screen="lesson"; render();
}
function startReviews(){
  const due=dueReviews(); if(!due.length) return;
  window._stageShown=new Set();
  window._sessionCorrect={};
  reviewQueue=[];
  due.forEach(w=>{reviewQueue.push({word:w,type:"meaning"});reviewQueue.push({word:w,type:"hanzi"});});
  for(let i=reviewQueue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[reviewQueue[i],reviewQueue[j]]=[reviewQueue[j],reviewQueue[i]];}
  reviewIdx=0; input=""; feedback=null;
  sessionCorrect=0; sessionTotal=0; sessionDone=false; showLevelUp=false;
  sessionStartTime=Date.now();
  screen="review"; render();
}

function checkAnswer(expected, wordId, type){
  const correct=similarWithSynonyms(input, expected, wordId, type);
  if(!correct && type==="meaning" && input.trim().length>0 && isNearMiss(input, expected)){
    nearMissActive=true;
    const inp=document.getElementById("answer-input");
    if(inp){ inp.classList.remove("shake"); void inp.offsetWidth; inp.classList.add("shake","wrong"); }
    let hint=document.getElementById("near-miss-hint");
    if(!hint){ hint=document.createElement("div"); hint.id="near-miss-hint"; hint.className="near-miss-hint"; inp?.parentNode?.insertBefore(hint,inp.nextSibling); }
    const accepted=getAcceptedAnswers(expected);
    const closest=accepted.reduce((best,x)=>editDistance(normalize(input),x)<editDistance(normalize(input),best)?x:best,accepted[0]);
    hint.textContent=`Almost! Check your spelling — did you mean "${closest}"?`;
    return;
  }
  nearMissActive=false;
  document.getElementById("near-miss-hint")?.remove();
  feedback={correct,answer:expected};
  sessionTotal++; if(correct) sessionCorrect++;
  render();
  setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}

function advanceReview(){
  feedback=null; input=""; nearMissActive=false;
  if(reviewIdx+1<reviewQueue.length){ reviewIdx++; render(); setTimeout(()=>document.getElementById("answer-input")?.focus(),50); }
  else{ finishSession(); const leveled=checkLevelUp(); save(); sessionDone=true; showLevelUp=leveled; render(); }
}
function submitReview(){
  if(feedback){ advanceReview(); return; }
  const{word,type}=reviewQueue[reviewIdx];
  const expected=type==="meaning"?word.english:word.hanzi;
  const cur=progress[word.id];
  const correct=similarWithSynonyms(input, expected, word.id, type);

  if(!window._sessionCorrect) window._sessionCorrect={};
  if(!window._sessionCorrect[word.id]) window._sessionCorrect[word.id]={meaning:null,hanzi:null};
  if(correct) window._sessionCorrect[word.id][type]=true;
  else if(window._sessionCorrect[word.id][type]!==true) window._sessionCorrect[word.id][type]=false;

  const pair=window._sessionCorrect[word.id];
  const bothAnswered=pair.meaning!==null&&pair.hanzi!==null;
  const bothCorrect=pair.meaning===true&&pair.hanzi===true;
  const eitherWrong=pair.meaning===false||pair.hanzi===false;
  const oldStage=cur.stage;
  let newStage=cur.stage;

  if(bothAnswered){
    if(bothCorrect) newStage=Math.min(cur.stage+1,SRS_STAGES.length-1);
    else if(eitherWrong) newStage=Math.max(cur.stage-1,0);
    progress[word.id]={...cur,stage:newStage,nextReview:Date.now()+SRS_INTERVALS[newStage]*3600000};
    save();
    if(newStage>oldStage){
      if(!window._stageShown) window._stageShown=new Set();
      const key=word.id+"-"+newStage;
      if(!window._stageShown.has(key)){ window._stageShown.add(key); setTimeout(()=>showStagePopup(oldStage,newStage),400); }
    }
  }
  recordAccuracy(word.id, correct);
  checkAnswer(expected, word.id, type);
}

function advanceLesson(){
  feedback=null; input=""; nearMissActive=false;
  if(lessonPhase==="learn"){ lessonPhase="quiz-meaning"; render(); setTimeout(()=>document.getElementById("answer-input")?.focus(),50); return; }
  if(lessonPhase==="quiz-meaning"){ lessonPhase="quiz-hanzi"; render(); setTimeout(()=>document.getElementById("answer-input")?.focus(),50); return; }
  if(lessonIdx+1<lessonQueue.length){ lessonIdx++; lessonPhase="learn"; render(); }
  else{
    lessonQueue.forEach(w=>{progress[w.id]={...progress[w.id],lessonDone:true,stage:0,nextReview:Date.now()+SRS_INTERVALS[0]*3600000};});
    const today=new Date().toDateString();
    const given=lessonsToday();
    localStorage.setItem("hanzi-lastday",today);
    localStorage.setItem("hanzi-lessonstoday",given+lessonQueue.length);
    finishSession(); const leveled=checkLevelUp(); save(); sessionDone=true; showLevelUp=leveled; render();
  }
}
function submitLesson(){
  if(feedback){ advanceLesson(); return; }
  const word=lessonQueue[lessonIdx];
  const isMeaning=lessonPhase==="quiz-meaning";
  const expected=isMeaning?word.english:word.hanzi;
  const correct=similarWithSynonyms(input, expected, word.id, isMeaning?"meaning":"hanzi");
  feedback={correct,answer:expected};
  sessionTotal++; if(correct) sessionCorrect++;
  render();
  setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}

function markCloseEnough(){
  feedback={correct:true,answer:feedback.answer,closeEnough:true};
  sessionCorrect++;
  render();
  setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}
function closeEnoughBtn(type){
  if(!feedback||feedback.correct||type!=="meaning") return "";
  return `<button onclick="markCloseEnough()" style="width:100%;margin-top:8px;background:#78350f44;color:#fbbf24;border:0.5px solid #78350f;border-radius:8px;padding:10px;font-size:14px">Close enough — I had a typo</button>`;
}

// ── BROWSE ─────────────────────────────────────────────────────────────────
function renderBrowse(app){
  const q=browseSearch.trim().toLowerCase();
  const maxLevel=Math.ceil(VOCAB.length/WORDS_PER_LEVEL);
  if(q){
    const results=VOCAB.filter(w=>w.hanzi.includes(q)||w.pinyin.toLowerCase().includes(q)||w.english.toLowerCase().includes(q));
    const cards=results.map(w=>{
      const unlocked=Math.ceil(w.id/WORDS_PER_LEVEL)<=currentLevel;
      const wcolor=stageColor(w); const lvl=Math.ceil(w.id/WORDS_PER_LEVEL);
      const tc=toneColor(w.tone||0);
      return `<div class="browse-card${!unlocked?" locked":""}" style="${unlocked?"background:"+wcolor+"22;border-color:"+wcolor+"44":""}" onclick="${unlocked?"openWord("+w.id+")":""}">
        <div style="font-size:9px;color:var(--muted);font-weight:600;margin-bottom:2px">LVL ${lvl}</div>
        <div class="hanzi-sm" style="color:${unlocked?wcolor:"#444"}">${w.hanzi}</div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:${unlocked?tc:"#444"};margin-bottom:2px">${unlocked?w.pinyin:""}</div>
        <div class="english-sm">${unlocked?w.english:"???"}</div>
      </div>`;
    }).join("");
    app.innerHTML=`${navHTML("browse")}
      <h2 style="margin-bottom:1rem">Browse</h2>
      <div style="position:relative;margin-bottom:1.5rem">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px">🔍</span>
        <input id="browse-search" type="text" value="${q.replace(/"/g,'&quot;')}" placeholder="Search hanzi, pinyin, or English…"
          style="width:100%;padding:13px 16px 13px 42px;font-size:15px;border-radius:12px;background:var(--surface);color:var(--text);border:1.5px solid var(--red-bright);outline:none;font-family:inherit;font-weight:500"
          oninput="browseSearch=this.value;renderBrowse(document.getElementById('app'))"/>
      </div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">${results.length} result${results.length!==1?"s":""}</p>
      ${results.length?`<div class="browse-grid">${cards}</div>`:`<div style="text-align:center;padding:3rem;color:var(--muted)">No characters found</div>`}
      ${selectedWord?renderModal():""}`;
    const inp=document.getElementById("browse-search");
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
    return;
  }
  let html="";
  for(let lvl=1;lvl<=maxLevel;lvl++){
    const words=wordsForLevel(lvl), unlocked=lvl<=currentLevel;
    const guruPct=Math.round(levelProgress(lvl)*100);
    const cards=words.map(w=>{
      const wcolor=stageColor(w), locked=!unlocked;
      const tc=toneColor(w.tone||0);
      return `<div class="browse-card${locked?" locked":""}" style="${locked?"":"background:"+wcolor+"22;border-color:"+wcolor+"44"}" onclick="${locked?"":"openWord("+w.id+")"}">
        <div class="hanzi-sm" style="color:${locked?"#444":wcolor}">${w.hanzi}</div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:${locked?"#444":tc};margin-bottom:2px">${locked?"":w.pinyin}</div>
        <div class="english-sm">${locked?"???":w.english}</div>
      </div>`;
    }).join("");
    html+=`<div class="browse-level-section">
      <div class="browse-level-header">
        <span class="browse-level-badge">Level ${lvl}</span>
        <span class="browse-level-title">${words.length} characters</span>
        <span class="browse-level-lock">${unlocked?(lvl===currentLevel?guruPct+"% to next level":"✓ complete"):"🔒 locked"}</span>
      </div>
      <div class="browse-grid">${cards}</div>
    </div>`;
  }
  app.innerHTML=`${navHTML("browse")}
    <h2 style="margin-bottom:1rem">Browse</h2>
    <div style="position:relative;margin-bottom:1.5rem">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px">🔍</span>
      <input id="browse-search" type="text" placeholder="Search hanzi, pinyin, or English…"
        style="width:100%;padding:13px 16px 13px 42px;font-size:15px;border-radius:12px;background:var(--surface);color:var(--text);border:1.5px solid var(--border2);outline:none;font-family:inherit;font-weight:500;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--red-bright)'" onblur="this.style.borderColor='var(--border2)'"
        oninput="browseSearch=this.value;renderBrowse(document.getElementById('app'))"/>
    </div>
    ${html}
    ${selectedWord?renderModal():""}`;
}

function openWord(id){ selectedWord=VOCAB.find(w=>w.id===id); if(!infoPanelCache[selectedWord?.id]) fetchWordInfo(selectedWord); render(); }
function closeModal(){ selectedWord=null; render(); }
function renderModal(){
  const w=selectedWord, p=progress[w.id];
  const stage=p?.lessonDone?SRS_STAGES[p.stage]:"Not started";
  const color=stageColor(w);
  const next=p?.lessonDone&&p.nextReview>Date.now()?new Date(p.nextReview).toLocaleDateString():p?.lessonDone?"Due now":"—";
  const acc=getAccuracy(w.id);
  const tc=toneColor(w.tone||0);
  const cached=infoPanelCache[w.id];
  const syns=getSynonyms(w.id);
  const synHTML=syns.map(s=>`<span style="display:inline-flex;align-items:center;gap:4px;background:#1e0f12;border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:500;margin:2px">${s}<button onclick="removeSynonym(${w.id},'${s}');selectedWord=VOCAB.find(x=>x.id===${w.id});render()" style="background:none;border:none;color:var(--muted);padding:0;font-size:14px;line-height:1;cursor:pointer;margin-left:2px">×</button></span>`).join("");
  return `<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="text-align:center;margin-bottom:10px">
      <span style="background:${tc}22;color:${tc};font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px">Tone ${w.tone||0} · ${["","1st (flat)","2nd (rising)","3rd (dip)","4th (falling)","Neutral"][w.tone||0]||""}</span>
    </div>
    <div class="modal-hanzi" style="color:${color}">${w.hanzi}</div>
    <div class="modal-pinyin" style="color:${tc}">${w.pinyin}</div>
    <div class="modal-english">${w.english}</div>
    <div class="modal-row"><span>SRS stage</span><span style="color:${color};font-weight:600">${stage}</span></div>
    <div class="modal-row"><span>Next review</span><span>${next}</span></div>
    <div class="modal-row"><span>Accuracy</span><span>${acc!==null?acc+"%":"—"}</span></div>
    <div class="modal-row"><span>Etymology</span><span style="color:var(--muted)">${w.etymology||"Compound"}</span></div>
    ${cached?.meaning?`<div style="margin-top:14px"><div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Meaning</div><div style="font-size:13px;line-height:1.65;color:#c4b8ba">${cached.meaning}</div></div>`:""}
    ${cached?.context?`<div style="margin-top:14px"><div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Example</div><div style="font-size:13px;line-height:1.75;color:#c4b8ba">${cached.context}</div></div>`:""}
    <div style="margin-top:14px">
      <div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">My synonyms</div>
      <div style="margin-bottom:8px;min-height:24px">${synHTML||'<span style="font-size:12px;color:var(--muted)">None added yet</span>'}</div>
      <div style="display:flex;gap:6px">
        <input id="syn-input" type="text" placeholder="Add synonym…"
          style="flex:1;padding:8px 10px;font-size:13px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border2);outline:none;font-family:inherit;font-weight:500"
          onkeydown="if(event.key==='Enter'){addSynonym(${w.id},this.value);this.value='';selectedWord=VOCAB.find(x=>x.id===${w.id});render()}"/>
        <button onclick="addSynonym(${w.id},document.getElementById('syn-input').value);document.getElementById('syn-input').value='';selectedWord=VOCAB.find(x=>x.id===${w.id});render()"
          style="padding:8px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600">Add</button>
      </div>
    </div>
    <button class="modal-close btn-secondary" onclick="closeModal()">Close</button>
  </div></div>`;
}

    if(settings.autoPlay) setTimeout(()=>speak(word.hanzi),200);

    const tc=toneColor(word.tone||0);
    app.innerHTML=`<div class="session-wrap">
      <div class="session-header">
        <button class="btn-back" onclick="screen='dashboard';render()">← back</button>
        <span style="font-size:13px;color:var(--muted);font-weight:500">${lessonIdx+1} / ${lessonQueue.length}</span>

        <div style="margin-bottom:1rem"><span style="background:${tc}22;color:${tc};font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px">${word.etymology||"Compound"}</span></div>
      </div>
      <div style="margin-bottom:1.25rem">
        ${cached?.meaning?`<div class="card" style="margin-bottom:.6rem;text-align:left">
          <div class="card-label">Meaning</div>
          <div style="font-size:13px;line-height:1.65;color:#c4b8ba">${cached.meaning}</div>
        </div>`:`<div class="card" style="margin-bottom:.6rem;color:var(--muted);font-size:13px"><span class="loading-dots">Loading</span></div>`}
        ${cached?.context?`<div class="card" style="text-align:left">
          <div class="card-label" style="display:flex;align-items:center;justify-content:space-between"><span>Example</span>${speakBtn(word.example_zh||word.hanzi,"13px")}</div>

      </div>

    </div>`;
    setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
    return;
  }
  const isMeaning=lessonPhase==="quiz-meaning";
  const prompt=isMeaning?word.hanzi:word.english;
  const placeholder=isMeaning?"Type English meaning…":"Type the hanzi character(s)…";
  const dirLabel=isMeaning?"🇨🇳 Hanzi → English":"🇬🇧 English → Hanzi";
  const tc=toneColor(word.tone||0);
  const nextLabel=lessonIdx+1<lessonQueue.length||!isMeaning?"Next →":"Finish lessons";
  const btnColor=feedback?(feedback.correct?"#16a34a":"#dc2626"):"#c0392b";
  app.innerHTML=`<div class="session-wrap">
    <div class="session-header">
      <button class="btn-back" onclick="screen='dashboard';render()">← back</button>
      <span style="font-size:13px;color:var(--muted);font-weight:500">${lessonIdx+1} / ${lessonQueue.length} · Quiz ${isMeaning?"1":"2"}/2</span>
    </div>
    <div class="session-progress"><div class="session-progress-fill" style="width:${Math.round(lessonIdx/lessonQueue.length*100)}%"></div></div>
    <div style="text-align:center">
      <div class="direction-label">${dirLabel}</div>
      <div class="${isMeaning?"big-hanzi":"big-word"}" style="${isMeaning?"font-family:'Noto Serif SC',serif;font-size:100px;text-align:center;line-height:1;margin:1rem 0 .25rem":"font-size:36px;text-align:center;margin:1.5rem 0;font-weight:700"}">${prompt}</div>
      ${isMeaning&&settings.showPinyinOnReview?`<div class="big-pinyin" style="color:${tc};margin-bottom:.5rem">${word.pinyin}</div>`:""}
      <div class="prompt-label">${isMeaning?"What is the English meaning?":"Type the hanzi characters"}</div>
      <input id="answer-input" type="text" class="${feedback?(feedback.correct?"correct":"wrong"):""}" value="${input.replace(/"/g,'&quot;')}" placeholder="${placeholder}" ${feedback?"disabled":""}
        ${!isMeaning?'lang="zh" inputmode="text"':""}/>
      ${feedback?`<div class="feedback ${feedback.correct?"correct":"wrong"}">${feedback.correct?"✓ Correct!":"✗ Wrong — correct answer: "+feedback.answer}</div>${closeEnoughBtn(isMeaning?"meaning":"hanzi")}`:""}
      <button id="next-btn" class="check-btn" style="background:${btnColor}" onclick="submitLesson()">${feedback?nextLabel:"Check →"}</button>
      ${infoBtnHTML(word.id)}
    </div>
  </div>`;
  if(!feedback){
    const inp=document.getElementById("answer-input");
    inp.focus();
    inp.addEventListener("input",e=>input=e.target.value);
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); submitLesson(); }});
    if(infoPanelOpen) closeInfoPanel();
  } else { setTimeout(()=>document.getElementById("next-btn")?.focus(),50); }
}

    <div class="session-header">
      <button class="btn-back" onclick="screen='dashboard';render()">← back</button>
      <span style="font-size:13px;color:var(--muted);font-weight:500">${reviewIdx+1} / ${reviewQueue.length}</span>

          ?`<div class="big-hanzi" style="margin:0;font-family:'Noto Serif SC',serif;font-size:100px;line-height:1">${prompt}</div>${speakBtn(word.hanzi)}`

      ${type==="meaning"&&settings.showPinyinOnReview?`<div class="big-pinyin" style="color:${tc};margin-bottom:.5rem">${word.pinyin}</div>`:""}
      <div class="prompt-label">${label}</div>
      <input id="answer-input" type="text" class="${feedback?(feedback.correct?"correct":"wrong"):""}" value="${input.replace(/"/g,'&quot;')}" placeholder="${type==="meaning"?"Type English meaning…":"Type hanzi…"}" ${feedback?"disabled":""}/>
      ${feedback?`<div class="feedback ${feedback.correct?"correct":"wrong"}">${
        feedback.correct?"✓ Correct!":"✗ Wrong — correct answer: "+feedback.answer

}

function openLessonPicker(){ pickerSelected=new Set(); screen="picker"; render(); }
function togglePickerWord(id){ if(pickerSelected.has(id)) pickerSelected.delete(id); else pickerSelected.add(id); render(); }
function selectAllPicker(){ wordsForLevel(currentLevel).filter(w=>!progress[w.id]?.lessonDone).forEach(w=>pickerSelected.add(w.id)); render(); }
function startPickerLessons(){
  if(!pickerSelected.size) return;
  lessonQueue=VOCAB.filter(w=>pickerSelected.has(w.id));
  lessonIdx=0; lessonPhase="learn"; input=""; feedback=null;
  sessionCorrect=0; sessionTotal=0; sessionDone=false; showLevelUp=false;
  sessionStartTime=Date.now(); screen="lesson"; render();
}
function renderPicker(app){
  const unlearned=wordsForLevel(currentLevel).filter(w=>!progress[w.id]?.lessonDone);
  const learned=wordsForLevel(currentLevel).filter(w=>progress[w.id]?.lessonDone);
  const sel=pickerSelected.size;
  const wordBtn=(w)=>{
    const isSel=pickerSelected.has(w.id);
    return `<div class="picker-word${isSel?" selected":""}" onclick="togglePickerWord(${w.id})" title="${w.english}">${w.hanzi}</div>`;
  };
  app.innerHTML=`${navHTML("dashboard")}
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <button class="btn-back" onclick="screen='dashboard';render()">← back</button>
    </div>
    <h2 style="margin-bottom:3px">Lesson Picker</h2>
    <p class="sub">Select characters to study, then start your custom batch.</p>
    ${unlearned.length?`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-label" style="margin-bottom:0">Level ${currentLevel} — Not yet learned (${unlearned.length})</div>
        <button onclick="selectAllPicker()" style="background:none;border:none;color:var(--red-bright);font-size:12px;font-weight:600;padding:0;cursor:pointer">Select all</button>
      </div>
      <div class="picker-grid">${unlearned.map(wordBtn).join("")}</div>
    </div>`:`<div class="card"><p style="color:var(--muted);font-size:14px">All characters in this level have been learned!</p></div>`}
    ${learned.length?`<div class="card">
      <div class="card-label">Already learned (${learned.length})</div>
      <div class="picker-grid">${learned.map(w=>`<div class="picker-word" style="opacity:.35;cursor:default" title="${w.english}">${w.hanzi}</div>`).join("")}</div>
    </div>`:""}
    <div style="position:sticky;bottom:1rem;padding-top:.5rem">
      <button class="btn-lesson" style="width:100%;${sel===0?"opacity:.35;cursor:not-allowed":""}" onclick="startPickerLessons()" ${sel===0?"disabled":""}>
        ${sel>0?`Start ${sel} character${sel>1?"s":""}`:"Select characters above to start"}
      </button>
    </div>`;
}

// ── SRS GUIDE ──────────────────────────────────────────────────────────────
function renderSRS(app){
  const stages=[
    {name:"Apprentice 1",color:"#c0392b",interval:"4h",cumulative:"4h",desc:"First encounter. Review in 4 hours.",icon:"🌱"},
    {name:"Apprentice 2",color:"#c0392b",interval:"8h",cumulative:"12h",desc:"Short-term recall building.",icon:"🌱"},
    {name:"Apprentice 3",color:"#c0392b",interval:"1d",cumulative:"~2d",desc:"Day-span memory forming.",icon:"🌱"},
    {name:"Apprentice 4",color:"#c0392b",interval:"3d",cumulative:"~5d",desc:"Almost Guru!",icon:"🌱"},
    {name:"Guru 1",color:"#d4960a",interval:"7d",cumulative:"~12d",desc:"Unlocks next level characters. Review in 1 week.",icon:"⬆️"},
    {name:"Guru 2",color:"#d4960a",interval:"14d",cumulative:"~26d",desc:"Two weeks between reviews.",icon:"⬆️"},
    {name:"Master",color:"#2563eb",interval:"1mo",cumulative:"~2mo",desc:"Monthly review. Character well known.",icon:"⭐"},
    {name:"Enlightened",color:"#0ea5e9",interval:"3mo",cumulative:"~5mo",desc:"Quarterly review. Nearly burned!",icon:"✨"},
    {name:"Burned",color:"#16a34a",interval:"∞",cumulative:"~6mo total",desc:"Permanently learned. 永远不忘.",icon:"🔥"},
  ];
  const sc=stageCounts();
  const stageRows=stages.map((s,i)=>{
    const count=sc[s.name]||0, isLast=i===stages.length-1;
    return `<div style="display:flex;align-items:stretch;gap:0;margin-bottom:0">
      <div style="display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0">
        <div style="width:36px;height:36px;border-radius:50%;background:${s.color}22;border:2px solid ${s.color};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;z-index:1">${s.icon}</div>
        ${!isLast?`<div style="width:2px;flex:1;background:linear-gradient(${s.color},${stages[i+1].color});min-height:32px;opacity:.3"></div>`:""}
      </div>
      <div style="flex:1;padding:0 0 28px 16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-size:15px;font-weight:700;color:${s.color}">${s.name}</span>
          <span style="background:${s.color}18;color:${s.color};font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px">+${s.interval}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:auto">${s.cumulative}</span>
        </div>
        <div style="font-size:13px;color:#9ca3af;margin-bottom:6px">${s.desc}</div>
        ${count>0?`<div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:5px;background:#ffffff08;border-radius:99px;max-width:180px">
            <div style="width:${Math.min(count/Math.max(...Object.values(sc),1)*100,100)}%;height:100%;background:${s.color};border-radius:99px"></div>
          </div>
          <span style="font-size:12px;font-weight:600;color:${s.color}">${count} char${count!==1?"s":""}</span>
        </div>`:`<span style="font-size:12px;color:var(--muted)">No characters yet</span>`}
      </div>
    </div>`;
  }).join("");
  const sc2=stageCounts();
  const burned=sc2["Burned"]||0;
  const apprentice=(sc2["Apprentice 1"]||0)+(sc2["Apprentice 2"]||0)+(sc2["Apprentice 3"]||0)+(sc2["Apprentice 4"]||0);
  const guru=(sc2["Guru 1"]||0)+(sc2["Guru 2"]||0);
  const master=sc2["Master"]||0;
  const enlightened=sc2["Enlightened"]||0;
  app.innerHTML=`${navHTML("srs")}
    <h2>SRS Guide</h2><p class="sub">How spaced repetition works for Hanzi</p>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-label">How it works</div>
      <p style="font-size:14px;color:#9ca3af;line-height:1.7;margin-bottom:12px">
        Each character goes through <b style="color:var(--text)">9 stages</b> before it's burned.
        Answer both Hanzi→English <i>and</i> English→Hanzi correctly to advance.
        One wrong answer and the character drops back. Intervals grow from 4 hours to 3 months.
      </p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${[["Apprentice",apprentice,"#c0392b"],["Guru",guru,"#d4960a"],["Master",master,"#2563eb"],["Enlightened",enlightened,"#0ea5e9"],["Burned",burned,"#16a34a"],["Days to burn","~182","var(--text)"]].map(([label,val,col])=>`
          <div style="text-align:center;background:#ffffff06;border-radius:10px;padding:12px">
            <div style="font-size:22px;font-weight:700;color:${col}">${val}</div>
            <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:2px">${label}</div>
          </div>`).join("")}
      </div>
    </div>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-label">Tone colors guide</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${[["1st tone (阴平) ā","flat high","#e74c3c"],["2nd tone (阳平) á","rising","#2980b9"],["3rd tone (上声) ǎ","falling-rising dip","#27ae60"],["4th tone (去声) à","sharply falling","#8e44ad"],["Neutral tone","unstressed","#888"]].map(([tone,desc,col])=>`
          <div style="display:flex;align-items:center;gap:10px">
            <span class="dot" style="background:${col};width:10px;height:10px"></span>
            <span style="font-size:14px;font-weight:600;color:${col};min-width:120px">${tone}</span>
            <span style="font-size:13px;color:var(--muted)">${desc}</span>
          </div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-label">Stage timeline</div>
      <div style="margin-top:8px">${stageRows}</div>
    </div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  try{ const r=await fetch("words.json"); VOCAB=await r.json(); }catch(e){ VOCAB=[]; }
  load(); initProgress(); render();
}
init();
if("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
</script>
</body>

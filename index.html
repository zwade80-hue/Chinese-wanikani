<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>汉字 Hanzi SRS</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c0392b"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap');
    :root{--bg:#0a0608;--surface:#110b0d;--surface2:#180f12;--border:#ffffff0d;--border2:#ffffff18;--text:#f0eaeb;--muted:#7a6b6e;--char-color:#c0392b;--char-glow:#c0392b33;--vocab-color:#7c3aed;--vocab-glow:#7c3aed33;--apprentice:#e85d9b;--guru:#8a5cf6;--master:#2563eb;--enlightened:#0ea5e9;--burned:#16a34a;--tone1:#e74c3c;--tone2:#2980b9;--tone3:#27ae60;--tone4:#8e44ad;--tone0:#888}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    body::after{content:'龙凤山水';position:fixed;right:-60px;top:50%;transform:translateY(-50%);font-family:'Noto Serif SC',serif;font-size:220px;font-weight:700;color:#ffffff03;writing-mode:vertical-rl;pointer-events:none;z-index:0;letter-spacing:10px;line-height:1}
    #app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:2rem 2.5rem}
    nav{display:flex;gap:4px;margin-bottom:2rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px}
    nav button{flex:1;background:none;border:none;color:var(--muted);font-size:15px;font-weight:500;cursor:pointer;padding:10px 12px;border-radius:10px;transition:all .16s;font-family:inherit}
    nav button:hover{color:var(--text);background:#ffffff07}
    nav button.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 4px #00000050}
    h2{font-size:26px;font-weight:700;margin-bottom:5px;letter-spacing:-.025em}
    p.sub{color:var(--muted);font-size:13px;margin-bottom:1.5rem}
    button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:10px;border:1px solid var(--border);padding:11px;transition:all .14s;font-weight:500}
    button:disabled{opacity:0.3;cursor:not-allowed}
    button:not(:disabled):active{transform:scale(.975)}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:1.5rem}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:border-color .18s}
    .metric:hover{border-color:var(--border2)}
    .metric .label{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
    .metric .value{font-size:32px;font-weight:700;letter-spacing:-.025em;line-height:1}
    .btn-row{display:flex;gap:14px;margin-bottom:1.5rem}
    .btn-review{flex:1;background:linear-gradient(135deg,#991b1b,#c0392b);color:#fff;border:none;font-size:16px;font-weight:700;padding:18px;border-radius:14px;box-shadow:0 2px 16px #c0392b28}
    .btn-review:not(:disabled):hover{filter:brightness(1.1)}
    .btn-lesson{flex:1;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;border:none;font-size:16px;font-weight:700;padding:18px;border-radius:14px;box-shadow:0 2px 16px #7c3aed28}
    .btn-lesson:not(:disabled):hover{filter:brightness(1.1)}
    .btn-secondary{background:var(--surface2);color:var(--text);width:100%;margin-top:10px;border:1px solid var(--border2)}
    .btn-secondary:hover{background:#1a1015;border-color:#ffffff22}
    .btn-back{background:none;border:none;color:var(--muted);font-size:13px;padding:0;font-weight:500}
    .btn-back:hover{color:var(--text)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1rem}
    .card-label{font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
    .level-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
    .level-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .level-title{font-size:14px;font-weight:700}
    .level-pct{font-size:11.5px;color:var(--muted);font-weight:500}
    .level-bar{height:8px;background:#ffffff09;border-radius:99px;overflow:hidden}
    .level-bar-fill{height:100%;background:linear-gradient(90deg,#c0392b,#7c3aed);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .stage-pills{display:flex;gap:6px;flex-wrap:wrap}
    .pill{display:flex;align-items:center;gap:6px;background:#ffffff06;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .type-badge-char{background:#c0392b22;color:#c0392b;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.03em}
    .type-badge-vocab{background:#7c3aed22;color:#a78bfa;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.03em}
    .session-wrap{max-width:640px;margin:0 auto;padding:0 1rem}
    .session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .session-progress{height:3px;background:#ffffff07;border-radius:99px;margin-bottom:2.5rem;overflow:hidden}
    .session-progress-fill{height:100%;border-radius:99px;transition:width .35s}
    .stage-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
    .direction-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;text-align:center}
    .big-hanzi{font-family:'Noto Serif SC',serif;font-size:110px;font-weight:700;margin:1rem 0 .25rem;text-align:center;line-height:1}
    .big-pinyin{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;text-align:center;margin-bottom:.5rem;letter-spacing:.05em}
    .prompt-label{font-size:13px;color:var(--muted);margin-bottom:1.75rem;text-align:center;font-weight:500}
    #answer-input{width:100%;padding:14px 16px;font-size:17px;border-radius:12px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;border:1.5px solid var(--border2);transition:border-color .14s,box-shadow .14s;font-weight:500}
    #answer-input:focus{border-color:#c0392b99;box-shadow:0 0 0 3px var(--char-glow)}
    #answer-input.vocab-mode:focus{border-color:#7c3aed99;box-shadow:0 0 0 3px var(--vocab-glow)}
    #answer-input.correct{border-color:#16a34a;box-shadow:0 0 0 3px #16a34a1e}
    #answer-input.wrong{border-color:#dc2626;box-shadow:0 0 0 3px #dc26261e}
    .feedback{margin:.75rem 0;padding:12px 16px;border-radius:10px;font-size:13.5px;text-align:center;font-weight:600}
    .feedback.correct{background:#14532d1a;color:#4ade80;border:1px solid #16a34a2e}
    .feedback.wrong{background:#7f1d1d1a;color:#f87171;border:1px solid #dc26262e}
    .check-btn{width:100%;margin-top:10px;color:#fff;border:none;font-size:15px;font-weight:700;padding:15px;border-radius:12px}
    .stats-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 0;margin-top:1.25rem;display:flex;font-size:13px;font-weight:700}
    .stats-bar span{flex:1;text-align:center;padding:2px 0}
    .stats-bar span:nth-child(1){color:#4ade80}
    .stats-bar span:nth-child(2){color:#f87171;border-left:1px solid var(--border);border-right:1px solid var(--border)}
    .stats-bar span:nth-child(3){color:var(--muted)}
    .done-screen{text-align:center;padding:4rem 1.5rem}
    .done-screen .emoji{font-size:56px;margin-bottom:1.25rem}
    .levelup-screen{text-align:center;padding:4rem 1.5rem}
    .levelup-num{font-size:100px;font-weight:800;background:linear-gradient(135deg,#c0392b,#e74c3c,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:1rem 0}
    .browse-level-section{margin-bottom:2rem}
    .browse-level-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .browse-level-badge{background:linear-gradient(135deg,#7f1d1d,#c0392b);color:#fff;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px}
    .browse-level-lock{font-size:12px;color:#374151;margin-left:auto}
    .browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:10px}
    .browse-card{border-radius:10px;padding:9px 6px;text-align:center;cursor:pointer;border:1px solid transparent;transition:transform .12s,box-shadow .12s}
    .browse-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px #00000050}
    .browse-card .hanzi-sm{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;margin-bottom:2px;line-height:1.2}
    .browse-card .english-sm{font-size:10px;opacity:.6;font-weight:500}
    .browse-card.locked{background:#110b0d;border-color:#ffffff06;opacity:.3;cursor:default}
    .browse-card.locked:hover{transform:none;box-shadow:none}
    .browse-section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:10px}
    .stage-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);z-index:300;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
    .stage-popup.show{opacity:1;transform:translate(-50%,-60%) scale(1)}
    .stage-popup.hide{opacity:0;transform:translate(-50%,-70%) scale(0.9);transition:all .3s ease}
    .stage-popup-badge{padding:10px 24px;border-radius:99px;font-size:18px;font-weight:800;box-shadow:0 8px 32px #00000060;white-space:nowrap}
    .stage-popup-label{font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.1em;opacity:.8}
    .info-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#110b0d;border-top:1px solid var(--border2);border-radius:20px 20px 0 0;box-shadow:0 -8px 40px #00000080;max-height:75vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
    .info-panel.open{transform:translateY(0)}
    .info-panel-tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;background:#110b0d;z-index:1;border-radius:20px 20px 0 0;overflow:hidden}
    .info-panel-tab{flex:1;padding:13px 8px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:0;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .info-panel-tab.active{color:var(--text);border-bottom-color:#c0392b}
    .info-panel-tab:hover{color:var(--text);background:#ffffff05}
    .info-panel-body{padding:1.25rem 1.5rem 2rem}
    .info-content{font-size:14px;line-height:1.7;color:#c4b8ba}
    .info-content b{color:var(--text);font-weight:600}
    .info-toggle-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:10px;padding:11px;background:#ffffff07;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .info-toggle-btn:hover{background:#ffffff0f;color:var(--text)}
    .info-toggle-btn.panel-open{color:#c0392b;border-color:#c0392b44;background:var(--char-glow)}
    .loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
    @keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}
    .picker-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
    .picker-word{padding:7px 12px;border-radius:8px;font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;cursor:pointer;border:1.5px solid transparent;background:#1a0f12;color:var(--muted);transition:all .14s;user-select:none}
    .picker-word:hover{border-color:var(--border2);color:var(--text)}
    .picker-word.sel-char{background:var(--char-glow);border-color:#c0392b;color:#c0392b}
    .picker-word.sel-vocab{background:var(--vocab-glow);border-color:#a78bfa;color:#a78bfa}
    .modal-bg{position:fixed;inset:0;background:#00000090;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;animation:fadein .14s}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .modal{background:#140c0f;border-radius:20px;padding:1.75rem;max-width:390px;width:100%;border:1px solid var(--border2);box-shadow:0 32px 80px #00000099;animation:slideup .16s cubic-bezier(.4,0,.2,1)}
    @keyframes slideup{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-hanzi{font-family:'Noto Serif SC',serif;font-size:72px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1}
    .modal-pinyin{font-family:'DM Mono',monospace;font-size:16px;text-align:center;margin-bottom:4px;letter-spacing:.05em}
    .modal-english{font-size:19px;color:#9ca3af;text-align:center;margin-bottom:1.25rem;font-weight:600}
    .modal-row{display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border);font-weight:500}
    .modal-row:last-child{border-bottom:none}
    .modal-row span:first-child{color:var(--muted)}
    .modal-close{width:100%;margin-top:1.1rem;background:#1a0f12;color:var(--text);border:1px solid var(--border2);font-weight:600}
    @keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
    .shake{animation:shake .4s ease}
    .near-miss-hint{margin:.5rem 0;padding:9px 14px;border-radius:8px;background:#78350f22;color:#fbbf24;border:1px solid #78350f44;font-size:13px;text-align:center}
    .components-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .component-chip{display:flex;align-items:center;gap:6px;background:#1a0f12;border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;transition:border-color .12s}
    .component-chip:hover{border-color:#c0392b44}
    .chip-hanzi{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700}
    .chip-meaning{font-size:11px;color:var(--muted)}
  </style>
</head>
<body>
<div style="position:fixed;top:20px;left:24px;z-index:50;width:96px;height:64px;border-radius:10px;overflow:hidden;box-shadow:0 6px 24px #00000070;opacity:0.92;background:#DE2910;display:flex;align-items:center;justify-content:center;">
  <div style="position:absolute;top:8px;left:10px;font-size:22px;line-height:1">⭐</div>
  <div style="position:absolute;top:6px;left:28px;font-size:10px;line-height:1.6;display:flex;flex-direction:column;gap:2px">
    <span style="transform:rotate(30deg);display:inline-block">⭐</span><span style="transform:rotate(20deg);display:inline-block">⭐</span><span style="transform:rotate(-20deg);display:inline-block">⭐</span><span style="transform:rotate(-30deg);display:inline-block">⭐</span>
  </div>
</div>
<div id="app"><p style="text-align:center;padding:3rem;color:#888">Loading...</p></div>
<script>
const SRS_STAGES=["Apprentice 1","Apprentice 2","Apprentice 3","Apprentice 4","Guru 1","Guru 2","Master","Enlightened","Burned"];
const SRS_INTERVALS=[4,8,24,72,168,336,730,2160,Infinity];
const STAGE_COLORS={"Apprentice 1":"#e85d9b","Apprentice 2":"#e85d9b","Apprentice 3":"#e85d9b","Apprentice 4":"#e85d9b","Guru 1":"#8a5cf6","Guru 2":"#8a5cf6","Master":"#2563eb","Enlightened":"#0ea5e9","Burned":"#16a34a"};
const TYPE_COLORS={character:"#c0392b",vocab:"#7c3aed"};
const TYPE_LABELS={character:"Character",vocab:"Vocab"};
const GURU_STAGE=4;
const HOUR_MS=3600000;
const TONE_COLORS=["#888","#e74c3c","#2980b9","#27ae60","#8e44ad"];

let settings={lessonsPerDay:15,reviewOrder:"shuffle",autoPlay:true,slowAudio:false,showPinyinOnReview:false};
function loadSettings(){const s=localStorage.getItem("hanzi-settings");if(s)settings={...settings,...JSON.parse(s)};}
function saveSettings(){localStorage.setItem("hanzi-settings",JSON.stringify(settings));}

let VOCAB=[],progress={},currentLevel=1;
let screen="dashboard",selectedWord=null;
let reviewQueue=[],reviewIdx=0;
let lessonQueue=[],lessonIdx=0,lessonPhase="learn";
let input="",feedback=null;
let sessionCorrect=0,sessionTotal=0,sessionDone=false,showLevelUp=false;
let sessionStartTime=null,nearMissActive=false;
let infoPanelOpen=false,infoPanelTab="meaning",infoPanelWord=null,infoPanelCache={};
let pickerSelected=new Set(),browseSearch="";

function save(){localStorage.setItem("hanzi-progress",JSON.stringify(progress));localStorage.setItem("hanzi-level",currentLevel);}
function load(){loadSettings();const p=localStorage.getItem("hanzi-progress");if(p)progress=JSON.parse(p);currentLevel=parseInt(localStorage.getItem("hanzi-level")||"1");}

function isChar(w){return w.type==="character";}
function itemColor(w){return TYPE_COLORS[w.type]||"#888";}
function toneColor(t){return TONE_COLORS[t]||TONE_COLORS[0];}

// Vocab unlocks when ALL component characters are Guru+
function vocabUnlocked(w){
  if(isChar(w))return true;
  if(!w.components||!w.components.length)return true;
  return w.components.every(id=>{const p=progress[id];return p?.lessonDone&&p.stage>=GURU_STAGE;});
}
function getComponentWords(w){if(!w.components)return[];return w.components.map(id=>VOCAB.find(x=>x.id===id)).filter(Boolean);}

function initProgress(){VOCAB.forEach(w=>{if(!progress[w.id])progress[w.id]={stage:0,nextReview:Date.now(),lessonDone:false};});}

// Level assignment: chars 1-40 = level 1, 41-80 = level 2; vocab 101-140 = level 1, 141-180 = level 2, etc.
function itemLevel(w){return isChar(w)?Math.ceil(w.id/40):Math.ceil((w.id-100)/40);}
function allItemsForLevel(lvl){return VOCAB.filter(w=>itemLevel(w)===lvl);}
function guruCount(lvl){return allItemsForLevel(lvl).filter(w=>progress[w.id]?.lessonDone&&progress[w.id]?.stage>=GURU_STAGE).length;}
function levelProgress(lvl){const w=allItemsForLevel(lvl);return w.length?guruCount(lvl)/w.length:0;}
function checkLevelUp(){if(currentLevel>=60)return false;if(levelProgress(currentLevel)>=0.9){currentLevel++;save();return true;}return false;}
function lessonsToday(){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-lastday");return last===today?parseInt(localStorage.getItem("hanzi-lessonstoday")||"0"):0;}
function availableLessons(){
  const rem=settings.lessonsPerDay-lessonsToday();if(rem<=0)return[];
  const items=allItemsForLevel(currentLevel).filter(w=>!progress[w.id]?.lessonDone&&vocabUnlocked(w));
  return[...items.filter(w=>isChar(w)),...items.filter(w=>!isChar(w))].slice(0,rem);
}
function dueReviews(){
  let due=VOCAB.filter(w=>progress[w.id]?.lessonDone&&progress[w.id]?.nextReview<=Date.now());
  if(settings.reviewOrder==="level")due.sort((a,b)=>a.id-b.id);
  else if(settings.reviewOrder==="stage")due.sort((a,b)=>progress[a.id].stage-progress[b.id].stage);
  return due;
}
function stageColor(w){const p=progress[w.id];if(!p?.lessonDone)return"#333";return STAGE_COLORS[SRS_STAGES[p.stage]]||"#888";}
function stageCounts(){const c={};SRS_STAGES.forEach(s=>c[s]=0);VOCAB.forEach(w=>{if(progress[w.id]?.lessonDone)c[SRS_STAGES[progress[w.id].stage]]++;});return c;}

function normalize(s){return s.trim().toLowerCase().replace(/[^a-z0-9 \/\-]/g,"").replace(/\s+/g," ").trim();}
function getAccepted(english){return english.replace(/\([^)]*\)/g," ").split("/").map(x=>normalize(x)).filter(x=>x.length>0);}
function similar(a,b){a=normalize(a);const acc=getAccepted(b);if(acc.some(x=>x===a))return true;return acc.some(x=>{if(Math.abs(a.length-x.length)>2)return false;let d=0;for(let i=0;i<Math.max(a.length,x.length);i++)if(a[i]!==x[i])d++;return d<=1;});}
function ed(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function isNearMiss(inp,exp){const a=normalize(inp),acc=getAccepted(exp);if(acc.some(x=>x===a))return false;return acc.some(x=>ed(a,x)<=(x.length<=5?1:2));}
function getSyns(id){return JSON.parse(localStorage.getItem("hanzi-syn-"+id)||"[]");}
function addSyn(id,s){s=s.trim().toLowerCase();if(!s)return;const ss=getSyns(id);if(!ss.includes(s)){ss.push(s);localStorage.setItem("hanzi-syn-"+id,JSON.stringify(ss));}}
function rmSyn(id,s){localStorage.setItem("hanzi-syn-"+id,JSON.stringify(getSyns(id).filter(x=>x!==s)));}
function checkAnswer(a,b,id,type){
  if(type==="hanzi")return a.trim()===b.trim();
  if(similar(a,b))return true;
  return getSyns(id).some(s=>s===normalize(a));
}

function getStreak(){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-streak-date"),c=parseInt(localStorage.getItem("hanzi-streak")||"0");if(last===today)return c;return last===new Date(Date.now()-86400000).toDateString()?c:0;}
function updateStreak(){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-streak-date"),c=parseInt(localStorage.getItem("hanzi-streak")||"0");if(last===today)return;localStorage.setItem("hanzi-streak",last===new Date(Date.now()-86400000).toDateString()?c+1:1);localStorage.setItem("hanzi-streak-date",today);}
function addTime(ms){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-time-date"),t=last===today?parseInt(localStorage.getItem("hanzi-time-today")||"0"):0;localStorage.setItem("hanzi-time-date",today);localStorage.setItem("hanzi-time-today",t+ms);}
function fmtTime(ms){const m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+"h "+(m%60)+"m":m+"m";}
function recAcc(id,ok){const k="hanzi-acc-"+id,d=JSON.parse(localStorage.getItem(k)||'{"c":0,"t":0}');d.t++;if(ok)d.c++;localStorage.setItem(k,JSON.stringify(d));}
function getAcc(id){const d=JSON.parse(localStorage.getItem("hanzi-acc-"+id)||'{"c":0,"t":0}');return d.t===0?null:Math.round(d.c/d.t*100);}

function getUpcoming(){const now=Date.now(),hours=Array(24).fill(0);VOCAB.forEach(w=>{const p=progress[w.id];if(!p?.lessonDone||p.nextReview<=now)return;const h=Math.ceil((p.nextReview-now)/HOUR_MS);if(h>0&&h<=24)hours[h-1]++;});return hours;}
function getForecast(){const now=Date.now(),days=[];for(let d=0;d<7;d++){const s=now+d*86400000,e=s+86400000;let c=0;VOCAB.forEach(w=>{const p=progress[w.id];if(!p?.lessonDone)return;if(p.nextReview>now&&p.nextReview>=s&&p.nextReview<e)c++;});days.push({label:d===0?"Today":d===1?"Tomorrow":new Date(s).toLocaleDateString("en-US",{weekday:"short"}),count:c});}let r=dueReviews().length;days.forEach(d=>{r+=d.count;d.total=r;});return days;}

function startReviews(){const due=dueReviews();if(!due.length)return;window._stageShown=new Set();window._sc={};reviewQueue=[];due.forEach(w=>{reviewQueue.push({word:w,type:"meaning"});reviewQueue.push({word:w,type:"hanzi"});});for(let i=reviewQueue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[reviewQueue[i],reviewQueue[j]]=[reviewQueue[j],reviewQueue[i]];}reviewIdx=0;input="";feedback=null;sessionCorrect=0;sessionTotal=0;sessionDone=false;showLevelUp=false;sessionStartTime=Date.now();screen="review";render();}

function submitReview(){
  if(feedback){advRev();return;}
  const{word,type}=reviewQueue[reviewIdx];
  const expected=type==="meaning"?word.english:word.hanzi;
  const cur=progress[word.id];
  const correct=checkAnswer(input,expected,word.id,type);
  if(!correct&&type==="meaning"&&input.trim().length>0&&isNearMiss(input,expected)){
    nearMissActive=true;const inp=document.getElementById("answer-input");
    if(inp){inp.classList.remove("shake");void inp.offsetWidth;inp.classList.add("shake","wrong");}
    let hint=document.getElementById("near-miss-hint");
    if(!hint){hint=document.createElement("div");hint.id="near-miss-hint";hint.className="near-miss-hint";inp?.parentNode?.insertBefore(hint,inp.nextSibling);}
    const acc=getAccepted(expected),cl=acc.reduce((b,x)=>ed(normalize(input),x)<ed(normalize(input),b)?x:b,acc[0]);
    hint.textContent='Almost! Did you mean "'+cl+'"?';return;
  }
  nearMissActive=false;document.getElementById("near-miss-hint")?.remove();
  if(!window._sc)window._sc={};if(!window._sc[word.id])window._sc[word.id]={meaning:null,hanzi:null};
  if(correct)window._sc[word.id][type]=true;else if(window._sc[word.id][type]!==true)window._sc[word.id][type]=false;
  const pair=window._sc[word.id],both=pair.meaning!==null&&pair.hanzi!==null,oldStage=cur.stage;let ns=cur.stage;
  if(both){if(pair.meaning===true&&pair.hanzi===true)ns=Math.min(cur.stage+1,SRS_STAGES.length-1);else if(pair.meaning===false||pair.hanzi===false)ns=Math.max(cur.stage-1,0);progress[word.id]={...cur,stage:ns,nextReview:Date.now()+SRS_INTERVALS[ns]*3600000};save();if(ns>oldStage){if(!window._stageShown)window._stageShown=new Set();const k=word.id+"-"+ns;if(!window._stageShown.has(k)){window._stageShown.add(k);setTimeout(()=>showStagePopup(oldStage,ns,word.type),400);}}}
  recAcc(word.id,correct);feedback={correct,answer:expected};sessionTotal++;if(correct)sessionCorrect++;render();setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}

  }

  const sc=stageCounts();
  const stages=[{name:"Apprentice 1",color:"#e85d9b",interval:"4h",desc:"First encounter.",icon:"🌱"},{name:"Apprentice 2",color:"#e85d9b",interval:"8h",desc:"Building memory.",icon:"🌱"},{name:"Apprentice 3",color:"#e85d9b",interval:"1d",desc:"Day-span recall.",icon:"🌱"},{name:"Apprentice 4",color:"#e85d9b",interval:"3d",desc:'Almost Guru! Vocab unlocks at Guru.',icon:"🌱"},{name:"Guru 1",color:"#8a5cf6",interval:"7d",desc:"🔓 Vocab words built from this character now unlock!",icon:"⬆️"},{name:"Guru 2",color:"#8a5cf6",interval:"14d",desc:"Two weeks between reviews.",icon:"⬆️"},{name:"Master",color:"#2563eb",interval:"1mo",desc:"Monthly review.",icon:"⭐"},{name:"Enlightened",color:"#0ea5e9",interval:"3mo",desc:"Quarterly review.",icon:"✨"},{name:"Burned",color:"#16a34a",interval:"∞",desc:"永远不忘 — Never forgotten.",icon:"🔥"}];
  const rows=stages.map((s,i)=>{const cnt=sc[s.name]||0,last=i===stages.length-1;return'<div style="display:flex;align-items:stretch;gap:0;margin-bottom:0"><div style="display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0"><div style="width:36px;height:36px;border-radius:50%;background:'+s.color+'22;border:2px solid '+s.color+';display:flex;align-items:center;justify-content:center;font-size:16px;z-index:1">'+s.icon+'</div>'+(last?"":'<div style="width:2px;flex:1;background:'+s.color+';min-height:32px;opacity:.2"></div>')+'</div><div style="flex:1;padding:0 0 28px 16px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap"><span style="font-size:15px;font-weight:700;color:'+s.color+'">'+s.name+'</span><span style="background:'+s.color+'18;color:'+s.color+';font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px">+'+s.interval+'</span></div><div style="font-size:13px;color:#9ca3af;margin-bottom:6px">'+s.desc+'</div>'+(cnt>0?'<span style="font-size:12px;font-weight:600;color:'+s.color+'">'+cnt+' item'+(cnt!==1?"s":"")+'</span>':'<span style="font-size:12px;color:var(--muted)">No items yet</span>')+'</div></div>';}).join("");
  app.innerHTML=navHTML("srs")+'<h2>SRS Guide</h2><p class="sub">How characters unlock vocabulary</p><div class="card" style="margin-bottom:1.25rem;border-color:#c0392b22"><div class="card-label">The unlock system</div><div style="font-size:14px;color:#9ca3af;line-height:1.7;margin-bottom:16px"><b style="color:var(--text)">Characters (red)</b> are learned first. Once a character reaches <b style="color:#8a5cf6">Guru</b>, vocabulary words built from it unlock (purple). This means you always understand the building blocks before seeing compound words.<br><br>Example: learn 山 and 水 separately → guru them → 山水 (landscape) unlocks.</div><div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center"><div style="flex:1;min-width:90px;background:#c0392b11;border:1px solid #c0392b33;border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Noto Serif SC\',serif;font-size:28px;color:#c0392b">山</div><div style="font-size:12px;color:#c0392b;font-weight:700">Character</div></div><div style="font-size:24px;color:var(--muted)">+</div><div style="flex:1;min-width:90px;background:#c0392b11;border:1px solid #c0392b33;border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Noto Serif SC\',serif;font-size:28px;color:#c0392b">水</div><div style="font-size:12px;color:#c0392b;font-weight:700">Character</div></div><div style="font-size:24px;color:var(--muted)">→ Guru →</div><div style="flex:1;min-width:90px;background:#7c3aed11;border:1px solid #7c3aed33;border-radius:10px;padding:12px;text-align:center"><div style="font-family:\'Noto Serif SC\',serif;font-size:28px;color:#a78bfa">山水</div><div style="font-size:12px;color:#a78bfa;font-weight:700">Vocab Unlocks</div></div></div></div><div class="card"><div class="card-label">Stage timeline</div><div style="margin-top:8px">'+rows+'</div></div>';
}

async function init(){try{const r=await fetch("words.json");VOCAB=await r.json();}catch(e){VOCAB=[];}load();initProgress();render();}
init();
if("serviceWorker" in navigator)navigator.serviceWorker.register("service-worker.js");

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>汉字 Hanzi SRS</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="var(--red)"/>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0c0c0e;
    --surface: #131316;
    --surface2: #1a1a1f;
    --surface3: #222228;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.11);
    --border3: rgba(255,255,255,0.18);
    --text: #f0eff4;
    --text2: #9998a8;
    --text3: #5c5b6b;
    --red: #e63946;
    --red-dim: rgba(230,57,70,0.12);
    --red-glow: rgba(230,57,70,0.2);
    --purple: #8b5cf6;
    --purple-dim: rgba(139,92,246,0.12);
    --purple-glow: rgba(139,92,246,0.2);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --blue: #38bdf8;
    --apprentice: #f472b6;
    --guru: var(--purple);
    --master: #60a5fa;
    --enlightened: #34d399;
    --burned: #22c55e;
    --tone1: #ef4444;
    --tone2: #3b82f6;
    --tone3: #22c55e;
    --tone4: #a855f7;
    --tone0: #6b7280;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(230,57,70,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 80%, rgba(139,92,246,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '字';
    position: fixed;
    right: -40px;
    bottom: -40px;
    font-family: 'Noto Serif SC', serif;
    font-size: 340px;
    font-weight: 900;
    color: rgba(255,255,255,0.018);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 2rem;
  }

  /* NAV */
  nav {
    display: flex;
    gap: 2px;
    margin-bottom: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 4px;
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Outfit', sans-serif;
    letter-spacing: .02em;
    cursor: pointer;
    padding: 9px 12px;
    border-radius: 8px;
    transition: all .15s;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: 11px;
  }

  nav button:hover { color: var(--text); background: var(--surface2); }
  nav button.active { background: var(--surface3); color: var(--text); }

  /* TYPOGRAPHY */
  h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -.03em;
    line-height: 1.1;
  }

  p.sub { color: var(--text2); font-size: 13px; margin-bottom: 1.75rem; font-weight: 400; }

  /* BUTTONS */
  button {
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    padding: 11px;
    transition: all .15s;
    font-weight: 500;
  }

  button:disabled { opacity: 0.28; cursor: not-allowed; }
  button:not(:disabled):active { transform: scale(.975); }

  .btn-row { display: flex; gap: 12px; margin-bottom: 1.5rem; }

  .btn-review {
    flex: 1;
    background: var(--red);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 18px;
    border-radius: 12px;
    letter-spacing: -.01em;
    transition: opacity .15s, transform .15s;
  }
  .btn-review:not(:disabled):hover { opacity: .88; }

  .btn-lesson {
    flex: 1;
    background: var(--purple);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 18px;
    border-radius: 12px;
    letter-spacing: -.01em;
    transition: opacity .15s, transform .15s;
  }
  .btn-lesson:not(:disabled):hover { opacity: .88; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    width: 100%;
    margin-top: 10px;
    border: 1px solid var(--border2);
  }
  .btn-secondary:hover { background: var(--surface3); border-color: var(--border3); }

  .btn-back {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 12px;
    padding: 0;
    font-weight: 500;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .btn-back:hover { color: var(--text2); }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  /* GRID METRICS */
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }

  .metric {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border-color .2s;
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    opacity: 0;
    transition: opacity .2s;
  }
  .metric:hover { border-color: var(--border3); }
  .metric:hover::before { opacity: 1; }
  .metric .label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .1em;
    display: block;
  }
  .metric .value {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -.04em;
    line-height: 1;
  }

  /* LEVEL BAR */
  .level-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 1.3rem 1.4rem;
    margin-bottom: 1.25rem;
  }
  .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .level-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
  .level-pct { font-size: 11px; color: var(--text3); font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .level-bar { height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; }
  .level-bar-fill {
    height: 100%;
    background: var(--red);
    border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* PILLS & BADGES */
  .stage-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  .type-badge-char {
    background: var(--red-dim);
    color: var(--red);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: .06em;
    text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
  }
  .type-badge-vocab {
    background: var(--purple-dim);
    color: var(--purple);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: .06em;
    text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
  }

  /* SESSION LAYOUT */
  .session-wrap { max-width: 600px; margin: 0 auto; padding: 0; }
  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .session-progress {
    height: 2px;
    background: var(--border2);
    border-radius: 99px;
    margin-bottom: 3rem;
    overflow: hidden;
  }
  .session-progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

  .stage-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* CARD DISPLAY */
  .direction-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .big-hanzi {
    font-family: 'Noto Serif SC', serif;
    font-size: 120px;
    font-weight: 700;
    margin: .5rem 0 .5rem;
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 80px rgba(230,57,70,0.15);
  }

  .big-pinyin {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    margin-bottom: .5rem;
    letter-spacing: .08em;
    color: var(--text2);
  }

  .prompt-label {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 1.5rem;
    text-align: center;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  /* INPUT */
  #answer-input {
    width: 100%;
    padding: 15px 18px;
    font-size: 17px;
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--border2);
    transition: border-color .15s, box-shadow .15s;
    font-weight: 400;
    letter-spacing: .02em;
  }
  #answer-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
  #answer-input.vocab-mode:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-glow); }
  #answer-input.correct { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-dim); }
  #answer-input.wrong { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }

  /* FEEDBACK */
  .feedback {
    margin: .75rem 0 0;
    padding: 11px 16px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    font-weight: 600;
    letter-spacing: .01em;
  }
  .feedback.correct { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .feedback.wrong { background: var(--red-dim); color: var(--red); border: 1px solid rgba(230,57,70,0.2); }

  /* CHECK BUTTON */
  .check-btn {
    width: 100%;
    margin-top: 12px;
    color: #fff;
    border: none;
    font-size: 14px;
    font-weight: 600;
    padding: 15px;
    border-radius: 10px;
    letter-spacing: .02em;
    transition: opacity .15s, transform .15s;
  }
  .check-btn:not(:disabled):hover { opacity: .88; }

  /* STATS BAR */
  .stats-bar {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 0;
    margin-top: 1.25rem;
    display: flex;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .stats-bar span { flex: 1; text-align: center; padding: 2px 0; }
  .stats-bar span:nth-child(1) { color: var(--green); }
  .stats-bar span:nth-child(2) { color: var(--red); border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); }
  .stats-bar span:nth-child(3) { color: var(--text3); }

  /* DONE / LEVELUP */
  .done-screen { text-align: center; padding: 5rem 1.5rem; }
  .done-screen .emoji { font-size: 52px; margin-bottom: 1.25rem; display: block; }
  .levelup-screen { text-align: center; padding: 5rem 1.5rem; }
  .levelup-num {
    font-size: 120px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
    margin: 1rem 0;
    letter-spacing: -.05em;
    font-family: 'Outfit', sans-serif;
  }

  /* BROWSE */
  .browse-level-section { margin-bottom: 2.5rem; }
  .browse-level-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .browse-level-badge {
    background: var(--red-dim);
    color: var(--red);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .browse-level-lock { font-size: 11px; color: var(--text3); margin-left: auto; font-weight: 500; }
  .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(76px,1fr)); gap: 6px; margin-bottom: 8px; }
  .browse-card {
    border-radius: 10px;
    padding: 10px 6px 8px;
    text-align: center;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .12s, border-color .12s, background .12s;
  }
  .browse-card:hover { transform: translateY(-2px); border-color: var(--border3); }
  .browse-card .hanzi-sm { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; margin-bottom: 3px; line-height: 1.2; }
  .browse-card .english-sm { font-size: 9px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  .browse-card.locked { background: var(--surface); border-color: var(--border); opacity: .25; cursor: default; }
  .browse-card.locked:hover { transform: none; }
  .browse-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 8px;
    margin-top: 12px;
  }

  /* STAGE POPUP */
  .stage-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.85);
    z-index: 300;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
  }
  .stage-popup.show { opacity: 1; transform: translate(-50%,-58%) scale(1); }
  .stage-popup.hide { opacity: 0; transform: translate(-50%,-66%) scale(0.9); transition: all .3s ease; }
  .stage-popup-badge {
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 17px;
    font-weight: 700;
    white-space: nowrap;
    font-family: 'Noto Serif SC', serif;
  }
  .stage-popup-label {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: .12em;
    opacity: .7;
  }

  /* INFO PANEL */
  .info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: #0f0f12;
    border-top: 1px solid var(--border2);
    border-radius: 18px 18px 0 0;
    max-height: 72vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  .info-panel.open { transform: translateY(0); }
  .info-panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: #0f0f12;
    z-index: 1;
    border-radius: 18px 18px 0 0;
    overflow: hidden;
    padding: 0 4px;
  }
  .info-panel-tab {
    flex: 1;
    padding: 14px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    background: none;
    border: none;
    border-radius: 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .info-panel-tab.active { color: var(--text); border-bottom-color: var(--red); }
  .info-panel-tab:hover { color: var(--text2); background: var(--border); }
  .info-panel-body { padding: 1.25rem 1.5rem 2.5rem; }
  .info-content { font-size: 14px; line-height: 1.75; color: var(--text2); }
  .info-content b { color: var(--text); font-weight: 600; }

  .info-toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    margin-top: 12px;
    padding: 11px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text3);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .info-toggle-btn:hover { background: var(--surface3); color: var(--text2); }
  .info-toggle-btn.panel-open { color: var(--red); border-color: rgba(230,57,70,0.3); background: var(--red-dim); }

  /* LOADING */
  .loading-dots::after { content: '...'; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  /* PICKER */
  .picker-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1rem; }
  .picker-word {
    padding: 7px 13px;
    border-radius: 8px;
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    transition: all .14s;
    user-select: none;
  }
  .picker-word:hover { border-color: var(--border3); color: var(--text); }
  .picker-word.sel-char { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .picker-word.sel-vocab { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }

  /* MODAL */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    animation: fadein .15s;
  }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 1.75rem;
    max-width: 380px;
    width: 100%;
    border: 1px solid var(--border2);
    animation: slideup .18s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideup { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-hanzi {
    font-family: 'Noto Serif SC', serif;
    font-size: 76px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    line-height: 1;
  }
  .modal-pinyin {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: .08em;
    color: var(--text2);
  }
  .modal-english {
    font-size: 18px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }
  .modal-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row span:first-child { color: var(--text3); }
  .modal-close {
    width: 100%;
    margin-top: 1.1rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    font-weight: 600;
  }

  /* ANIMATIONS */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-5px)}
    30%{transform:translateX(5px)}
    45%{transform:translateX(-4px)}
    60%{transform:translateX(4px)}
    75%{transform:translateX(-2px)}
    90%{transform:translateX(2px)}
  }
  .shake { animation: shake .38s ease; }

  /* MULTIPLE CHOICE */
  .mc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 1.75rem;
  }
  .mc-btn {
    font-family: 'Noto Serif SC', serif;
    font-size: 40px;
    font-weight: 700;
    padding: 22px 10px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    line-height: 1.1;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .mc-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background .15s;
  }
  .mc-btn:hover:not(:disabled) { border-color: var(--border3); background: var(--surface2); transform: translateY(-2px); }
  .mc-btn.correct, .mc-btn.reveal { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .mc-btn.wrong { border-color: var(--red); background: var(--red-dim); color: var(--red); }

  /* NEAR MISS */
  .near-miss-hint {
    margin: .5rem 0;
    padding: 9px 14px;
    border-radius: 8px;
    background: rgba(245,158,11,0.08);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.2);
    font-size: 13px;
    text-align: center;
  }

  /* COMPONENTS CHIPS */
  .components-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .component-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .component-chip:hover { border-color: rgba(230,57,70,0.4); background: var(--red-dim); }
  .chip-hanzi { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; }
  .chip-meaning { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-top: 1px; }
</style>
</head>
<body>

<div style="position:fixed;top:20px;left:20px;z-index:50;width:90px;height:60px;border-radius:4px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.5)">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20" width="90" height="60">
  <rect width="30" height="20" fill="#DE2910"/>
  <polygon fill="#FFDE00" points="7.5,4.5 8.68,8.15 12.5,8.15 9.41,10.35 10.59,14 7.5,11.8 4.41,14 5.59,10.35 2.5,8.15 6.32,8.15"/>
  <polygon fill="#FFDE00" transform="translate(12.5,7) rotate(24.8)" points="0,-1 0.29,-0.4 0.95,-0.31 0.47,0.15 0.59,0.81 0,-0.48 -0.59,0.81 -0.47,0.15 -0.95,-0.31 -0.29,-0.4"/>
  <polygon fill="#FFDE00" transform="translate(15,5) rotate(7.4)" points="0,-1 0.29,-0.4 0.95,-0.31 0.47,0.15 0.59,0.81 0,-0.48 -0.59,0.81 -0.47,0.15 -0.95,-0.31 -0.29,-0.4"/>
  <polygon fill="#FFDE00" transform="translate(15,8.5) rotate(-14)" points="0,-1 0.29,-0.4 0.95,-0.31 0.47,0.15 0.59,0.81 0,-0.48 -0.59,0.81 -0.47,0.15 -0.95,-0.31 -0.29,-0.4"/>
  <polygon fill="#FFDE00" transform="translate(13,11) rotate(-28.2)" points="0,-1 0.29,-0.4 0.95,-0.31 0.47,0.15 0.59,0.81 0,-0.48 -0.59,0.81 -0.47,0.15 -0.95,-0.31 -0.29,-0.4"/>
</svg>
</div>
<div id="app"><p style="text-align:center;padding:3rem;color:var(--text3)">Loading...</p></div>
<script>
const SRS_STAGES=["Apprentice 1","Apprentice 2","Apprentice 3","Apprentice 4","Guru 1","Guru 2","Master","Enlightened","Burned"];
const SRS_INTERVALS=[4,8,24,72,168,336,730,2160,Infinity];
const STAGE_COLORS={"Apprentice 1":"var(--apprentice)","Apprentice 2":"var(--apprentice)","Apprentice 3":"var(--apprentice)","Apprentice 4":"var(--apprentice)","Guru 1":"var(--guru)","Guru 2":"var(--guru)","Master":"var(--master)","Enlightened":"var(--enlightened)","Burned":"var(--green)"};
const TYPE_COLORS={character:"var(--red)",vocab:"var(--purple)"};
const TYPE_LABELS={character:"Character",vocab:"Vocab"};
const GURU_STAGE=4;
const HOUR_MS=3600000;
const TONE_COLORS=["#888","#e74c3c","#2980b9","#27ae60","#8e44ad"];

let settings={lessonsPerDay:15,reviewOrder:"shuffle",autoPlay:true,slowAudio:false,showPinyinOnReview:false};
function loadSettings(){const s=localStorage.getItem("hanzi-settings");if(s)settings={...settings,...JSON.parse(s)};}
function saveSettings(){localStorage.setItem("hanzi-settings",JSON.stringify(settings));}

let VOCAB=[],progress={},currentLevel=1;
let screen="dashboard",selectedWord=null;
let reviewQueue=[],reviewIdx=0;
let lessonQueue=[],lessonIdx=0,lessonPhase="learn";
let input="",feedback=null;
let sessionCorrect=0,sessionTotal=0,sessionDone=false,showLevelUp=false;
let sessionStartTime=null,nearMissActive=false;
let infoPanelOpen=false,infoPanelTab="meaning",infoPanelWord=null,infoPanelCache={};
let pickerSelected=new Set(),browseSearch="";

function save(){localStorage.setItem("hanzi-progress",JSON.stringify(progress));localStorage.setItem("hanzi-level",currentLevel);}
function load(){loadSettings();const p=localStorage.getItem("hanzi-progress");if(p)progress=JSON.parse(p);currentLevel=parseInt(localStorage.getItem("hanzi-level")||"1");}

function isChar(w){return w.type==="character";}
function itemColor(w){return TYPE_COLORS[w.type]||"#888";}
function toneColor(t){return TONE_COLORS[t]||TONE_COLORS[0];}

// Vocab unlocks when ALL component characters are Guru+
function vocabUnlocked(w){
  if(isChar(w))return true;
  if(!w.components||!w.components.length)return true;
  return w.components.every(id=>{const p=progress[id];return p?.lessonDone&&p.stage>=GURU_STAGE;});
}
function getComponentWords(w){if(!w.components)return[];return w.components.map(id=>VOCAB.find(x=>x.id===id)).filter(Boolean);}

function initProgress(){VOCAB.forEach(w=>{if(!progress[w.id])progress[w.id]={stage:0,nextReview:Date.now(),lessonDone:false};});}

// Level assignment: chars 1-40 = level 1, 41-80 = level 2; vocab 101-140 = level 1, 141-180 = level 2, etc.
function itemLevel(w){return isChar(w)?Math.ceil(w.id/40):Math.ceil((w.id-100)/40);}
function allItemsForLevel(lvl){return VOCAB.filter(w=>itemLevel(w)===lvl);}
function guruCount(lvl){return allItemsForLevel(lvl).filter(w=>progress[w.id]?.lessonDone&&progress[w.id]?.stage>=GURU_STAGE).length;}
function levelProgress(lvl){const w=allItemsForLevel(lvl);return w.length?guruCount(lvl)/w.length:0;}
function checkLevelUp(){if(currentLevel>=60)return false;if(levelProgress(currentLevel)>=0.9){currentLevel++;save();return true;}return false;}
function lessonsToday(){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-lastday");return last===today?parseInt(localStorage.getItem("hanzi-lessonstoday")||"0"):0;}
function availableLessons(){
  const rem=settings.lessonsPerDay-lessonsToday();if(rem<=0)return[];
  const items=allItemsForLevel(currentLevel).filter(w=>!progress[w.id]?.lessonDone&&vocabUnlocked(w));
  return[...items.filter(w=>isChar(w)),...items.filter(w=>!isChar(w))].slice(0,rem);
}
function dueReviews(){
  let due=VOCAB.filter(w=>progress[w.id]?.lessonDone&&progress[w.id]?.nextReview<=Date.now());
  if(settings.reviewOrder==="level")due.sort((a,b)=>a.id-b.id);
  else if(settings.reviewOrder==="stage")due.sort((a,b)=>progress[a.id].stage-progress[b.id].stage);
  return due;
}
function stageColor(w){const p=progress[w.id];if(!p?.lessonDone)return"#333";return STAGE_COLORS[SRS_STAGES[p.stage]]||"#888";}
function stageCounts(){const c={};SRS_STAGES.forEach(s=>c[s]=0);VOCAB.forEach(w=>{if(progress[w.id]?.lessonDone)c[SRS_STAGES[progress[w.id].stage]]++;});return c;}

function normalize(s){return s.trim().toLowerCase().replace(/[^a-z0-9 \/\-]/g,"").replace(/\s+/g," ").trim();}
function getAccepted(english){return english.replace(/\([^)]*\)/g," ").split("/").map(x=>normalize(x)).filter(x=>x.length>0);}
function similar(a,b){a=normalize(a);const acc=getAccepted(b);if(acc.some(x=>x===a))return true;return acc.some(x=>{if(Math.abs(a.length-x.length)>2)return false;let d=0;for(let i=0;i<Math.max(a.length,x.length);i++)if(a[i]!==x[i])d++;return d<=1;});}
function ed(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function isNearMiss(inp,exp){const a=normalize(inp),acc=getAccepted(exp);if(acc.some(x=>x===a))return false;return acc.some(x=>ed(a,x)<=(x.length<=5?1:2));}
function getSyns(id){return JSON.parse(localStorage.getItem("hanzi-syn-"+id)||"[]");}
function addSyn(id,s){s=s.trim().toLowerCase();if(!s)return;const ss=getSyns(id);if(!ss.includes(s)){ss.push(s);localStorage.setItem("hanzi-syn-"+id,JSON.stringify(ss));}}
function rmSyn(id,s){localStorage.setItem("hanzi-syn-"+id,JSON.stringify(getSyns(id).filter(x=>x!==s)));}

// ── PINYIN UTILS ─────────────────────────────────────────────────────────────
const TONE_MAP={'a':['ā','á','ǎ','à','a'],'e':['ē','é','ě','è','e'],'i':['ī','í','ǐ','ì','i'],'o':['ō','ó','ǒ','ò','o'],'u':['ū','ú','ǔ','ù','u'],'ü':['ǖ','ǘ','ǚ','ǜ','ü'],'v':['ǖ','ǘ','ǚ','ǜ','ü']};
const VOWEL_ORDER=['a','e','o','ü','v','i','u'];
function numToMark(syl){const m=syl.match(/^([a-züv]+)([0-5])$/i);if(!m)return syl;const base=m[1].toLowerCase(),tone=parseInt(m[2]);if(tone===5||tone===0)return base;for(const v of VOWEL_ORDER){if(base.includes(v)){const map=TONE_MAP[v];if(map)return base.replace(v,map[tone-1]);}}return base;}
function normalizePinyin(s){s=s.trim().toLowerCase().replace(/’/g,'').replace(/'/g,'').replace(/u:/g,'ü').replace(/v(?=[a-züv0-9])/g,'ü');s=s.replace(/[a-züv]+[0-5]/gi,m=>numToMark(m.toLowerCase()));return s.replace(/\s+/g,'').trim();}
function checkPinyin(input,expected){return normalizePinyin(input)===normalizePinyin(expected);}

function checkAnswer(a,b,id,type){
  if(type==="hanzi")return a.trim()===b.trim();
  if(similar(a,b))return true;
  return getSyns(id).some(s=>s===normalize(a));
}

function getStreak(){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-streak-date"),c=parseInt(localStorage.getItem("hanzi-streak")||"0");if(last===today)return c;return last===new Date(Date.now()-86400000).toDateString()?c:0;}
function updateStreak(){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-streak-date"),c=parseInt(localStorage.getItem("hanzi-streak")||"0");if(last===today)return;localStorage.setItem("hanzi-streak",last===new Date(Date.now()-86400000).toDateString()?c+1:1);localStorage.setItem("hanzi-streak-date",today);}
function addTime(ms){const today=new Date().toDateString(),last=localStorage.getItem("hanzi-time-date"),t=last===today?parseInt(localStorage.getItem("hanzi-time-today")||"0"):0;localStorage.setItem("hanzi-time-date",today);localStorage.setItem("hanzi-time-today",t+ms);}
function fmtTime(ms){const m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+"h "+(m%60)+"m":m+"m";}
function recAcc(id,ok){const k="hanzi-acc-"+id,d=JSON.parse(localStorage.getItem(k)||'{"c":0,"t":0}');d.t++;if(ok)d.c++;localStorage.setItem(k,JSON.stringify(d));}
function getAcc(id){const d=JSON.parse(localStorage.getItem("hanzi-acc-"+id)||'{"c":0,"t":0}');return d.t===0?null:Math.round(d.c/d.t*100);}

function getUpcoming(){const now=Date.now(),hours=Array(24).fill(0);VOCAB.forEach(w=>{const p=progress[w.id];if(!p?.lessonDone||p.nextReview<=now)return;const h=Math.ceil((p.nextReview-now)/HOUR_MS);if(h>0&&h<=24)hours[h-1]++;});return hours;}
function getForecast(){const now=Date.now(),days=[];for(let d=0;d<7;d++){const s=now+d*86400000,e=s+86400000;let c=0;VOCAB.forEach(w=>{const p=progress[w.id];if(!p?.lessonDone)return;if(p.nextReview>now&&p.nextReview>=s&&p.nextReview<e)c++;});days.push({label:d===0?"Today":d===1?"Tomorrow":new Date(s).toLocaleDateString("en-US",{weekday:"short"}),count:c});}let r=dueReviews().length;days.forEach(d=>{r+=d.count;d.total=r;});return days;}

let _stageTimer=null;
function showStagePopup(old,nw,type){
  if(nw<=old)return;
  const name=SRS_STAGES[nw],col=STAGE_COLORS[name]||"#888";
  document.getElementById("stage-popup")?.remove();clearTimeout(_stageTimer);
  const msgs={"Apprentice 1":["学徒一","Getting started!"],"Apprentice 2":["学徒二","Building memory..."],"Apprentice 3":["学徒三","Getting there!"],"Apprentice 4":["学徒四","Almost Guru!"],"Guru 1":["达人一 🎉","Vocab unlocks!"],"Guru 2":["达人二 🎉","Locking it in!"],"Master":["大师 ⭐","You know this!"],"Enlightened":["觉悟 ✨","Nearly burned!"],"Burned":["永恒 🔥","永远不忘!"]};
  const [label,sub]=msgs[name]||[name,"Level up!"];
  const el=document.createElement("div");el.id="stage-popup";el.className="stage-popup";
  el.innerHTML='<div class="stage-popup-badge" style="background:'+col+';color:#fff;font-family:\'Noto Serif SC\',serif">'+label+'</div><div class="stage-popup-label">'+sub+'</div>';
  document.body.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("show")));
  _stageTimer=setTimeout(()=>{el.classList.remove("show");el.classList.add("hide");setTimeout(()=>el.remove(),350);},1800);
}

function fetchInfo(w){
  infoPanelCache[w.id]={etymology:w.etymology||"Compound",meaning:w.meaning||"<b>"+w.hanzi+"</b> ("+w.pinyin+') means "'+w.english+'".',context:w.example_zh?"<b style=\"font-family:'Noto Serif SC',serif;font-size:16px\">"+w.example_zh+"</b><br><span style=\"color:var(--muted)\">"+w.example_en+"</span>":"No example available."};
  renderInfoPanel();if(selectedWord?.id===w.id||(screen==="lesson"&&lessonPhase==="learn"&&lessonQueue[lessonIdx]?.id===w.id))render();
}

function speak(t){
  if(!t)return;
  const slow=settings.slowAudio;
  const url='https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=zh-CN&q='+encodeURIComponent(t);
  if(window._ttsAudio){window._ttsAudio.pause();window._ttsAudio=null;}
  const audio=new Audio(url);
  audio.playbackRate=slow?0.7:1.0;
  window._ttsAudio=audio;
  audio.play().catch(()=>{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang="zh-CN";u.rate=slow?0.6:0.85;
    speechSynthesis.speak(u);
  });
}
function spkBtn(t,sz){sz=sz||"15px";var safe=t.replace(/"/g,"&quot;");return '<button onclick="event.stopPropagation();speak(this.dataset.t)" data-t="'+safe+'" style="background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--muted);font-size:'+sz+';cursor:pointer;line-height:1" title="Play audio">🔊</button>';}

function finishSession(){if(sessionStartTime){addTime(Date.now()-sessionStartTime);updateStreak();sessionStartTime=null;}}


// ── MULTIPLE CHOICE ──────────────────────────────────────────────────────────
let mcOptions=[],mcAnswered=false;

function generateMCOptions(correctWord){
  // Pick 3 wrong answers from same level or nearby levels, same type preferred
  const pool=VOCAB.filter(w=>w.id!==correctWord.id&&w.type===correctWord.type&&progress[w.id]?.lessonDone);
  // Fallback to any learned items if not enough same-type
  const fallback=VOCAB.filter(w=>w.id!==correctWord.id&&progress[w.id]?.lessonDone);
  let candidates=pool.length>=3?pool:fallback;
  // Shuffle and pick 3
  const shuffled=[...candidates].sort(()=>Math.random()-0.5).slice(0,3);
  const opts=[correctWord,...shuffled].sort(()=>Math.random()-0.5);
  return opts;
}

function submitMC(chosenId,correctId,fromLesson){
  if(mcAnswered)return;
  mcAnswered=true;
  const correct=chosenId===correctId;
  // Highlight buttons
  document.querySelectorAll('.mc-btn').forEach(btn=>{
    const id=parseInt(btn.dataset.id);
    if(id===correctId)btn.classList.add('reveal');
    else if(id===chosenId&&!correct)btn.classList.add('wrong');
    btn.disabled=true;
  });
  // Show feedback banner
  const fb=document.getElementById('mc-feedback');
  if(fb){fb.className='feedback '+(correct?'correct':'wrong');fb.style.display='';fb.textContent=correct?'✓ Correct!':'✗ Wrong — look at the highlighted answer';}
  // Show next button
  const nextBtn=document.getElementById('next-btn');
  if(nextBtn){nextBtn.style.display='';}
  // Record in session
  sessionTotal++;
  if(correct)sessionCorrect++;
  const w=fromLesson?lessonQueue[lessonIdx]:reviewQueue[reviewIdx].word;
  recAcc(w.id,correct);
  feedback={correct,answer:VOCAB.find(x=>x.id===correctId)?.hanzi};
  // For reviews: track per-word score so advRev can update SRS
  if(!fromLesson){
    const type=reviewQueue[reviewIdx].type;
    if(!window._sc[w.id])window._sc[w.id]={meaning:null,reading:null,hanzi:null};
    if(correct)window._sc[w.id][type]=true;
    else if(window._sc[w.id][type]!==true)window._sc[w.id][type]=false;
  }
  setTimeout(()=>document.getElementById('next-btn')?.focus(),50);
}

function renderMCOptions(opts,correctId,fromLesson){
  const nextBtnColor=feedback?.correct?'var(--green)':'var(--red)';
  return '<div class="mc-grid">'+opts.map(w=>{
    let cls='mc-btn';
    if(mcAnswered){if(w.id===correctId)cls+=' reveal';else if(feedback&&!feedback.correct&&w.id===opts.find(x=>x.id===correctId)?.id)cls+=' reveal';}
    return '<button class="'+cls+'" data-id="'+w.id+'" onclick="submitMC('+w.id+','+correctId+','+fromLesson+')" '+(mcAnswered?'disabled':'')+'>'+w.hanzi+'</button>';
  }).join('')+'</div>'
  +'<div id="mc-feedback" class="feedback" style="'+(mcAnswered?'':'display:none')+'">'+(mcAnswered?(feedback?.correct?'✓ Correct!':'✗ Wrong — look at the green answer'):'')+'</div>'
  +'<button id="next-btn" class="check-btn" style="margin-top:10px;background:'+nextBtnColor+';'+(mcAnswered?'':'display:none')+'" onclick="'+(fromLesson?'advLesson()':'advRev()')+'">Next →</button>';
}
function startLessons(){lessonQueue=availableLessons();if(!lessonQueue.length)return;lessonIdx=0;lessonPhase="learn";input="";feedback=null;sessionCorrect=0;sessionTotal=0;sessionDone=false;showLevelUp=false;sessionStartTime=Date.now();screen="lesson";render();}
function startReviews(){const due=dueReviews();if(!due.length)return;window._stageShown=new Set();window._sc={};reviewQueue=[];due.forEach(w=>{reviewQueue.push({word:w,type:"meaning"});reviewQueue.push({word:w,type:"reading"});reviewQueue.push({word:w,type:"hanzi"});});for(let i=reviewQueue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[reviewQueue[i],reviewQueue[j]]=[reviewQueue[j],reviewQueue[i]];}reviewIdx=0;input="";feedback=null;sessionCorrect=0;sessionTotal=0;sessionDone=false;showLevelUp=false;sessionStartTime=Date.now();screen="review";render();}

function advRev(){
  const wasWrong=feedback&&!feedback.correct;
  feedback=null;input="";nearMissActive=false;mcAnswered=false;
  if(wasWrong){
    // Push this card to the end so they must redo it
    reviewQueue.push(reviewQueue[reviewIdx]);
  }
  if(reviewIdx+1<reviewQueue.length){
    reviewIdx++;
    render();
    setTimeout(()=>document.getElementById("answer-input")?.focus(),50);
  }else{
    finishSession();const lv=checkLevelUp();save();sessionDone=true;showLevelUp=lv;render();
  }
}
function submitReview(){
  if(feedback){advRev();return;}
  const{word:w,type}=reviewQueue[reviewIdx];
  const cur=progress[w.id];

  // Determine correct answer and check it
  let expected,correct;
  if(type==="meaning"){
    expected=w.english;
    correct=checkAnswer(input,expected,w.id,"meaning");
  } else {
    // reading: show hanzi, type pinyin
    expected=w.pinyin;
    correct=checkPinyin(input,expected);
  }

  // Near-miss for meaning only (shake + hint, early return so user can fix typo)
  if(!correct&&type==="meaning"&&input.trim().length>0&&isNearMiss(input,expected)){
    nearMissActive=true;
    const inp=document.getElementById("answer-input");
    if(inp){inp.classList.remove("shake");void inp.offsetWidth;inp.classList.add("shake","wrong");}
    let hint=document.getElementById("near-miss-hint");
    if(!hint){hint=document.createElement("div");hint.id="near-miss-hint";hint.className="near-miss-hint";inp?.parentNode?.insertBefore(hint,inp.nextSibling);}
    const acc=getAccepted(expected),cl=acc.reduce((b,x)=>ed(normalize(input),x)<ed(normalize(input),b)?x:b,acc[0]);
    hint.textContent='Almost! Did you mean "'+cl+'"?';
    return;
  }
  nearMissActive=false;
  document.getElementById("near-miss-hint")?.remove();

  // Track per-word scores (reset each session via window._sc set in startReviews)
  if(!window._sc[w.id])window._sc[w.id]={meaning:null,reading:null,hanzi:null};
  if(correct) window._sc[w.id][type]=true;
  else if(window._sc[w.id][type]!==true) window._sc[w.id][type]=false;

  // Update SRS only when both parts answered
  const pair=window._sc[w.id];
  if(pair.meaning!==null&&pair.reading!==null&&pair.hanzi!==null){
    const oldStage=cur.stage;
    let ns=cur.stage;
    if(pair.meaning===true&&pair.reading===true&&pair.hanzi===true) ns=Math.min(cur.stage+1,SRS_STAGES.length-1);
    else ns=Math.max(cur.stage-1,0);
    progress[w.id]={...cur,stage:ns,nextReview:Date.now()+SRS_INTERVALS[ns]*3600000};
    save();
    if(ns>oldStage){
      if(!window._stageShown)window._stageShown=new Set();
      const k=w.id+"-"+ns;
      if(!window._stageShown.has(k)){window._stageShown.add(k);setTimeout(()=>showStagePopup(oldStage,ns,w.type),400);}
    }
  }

  recAcc(w.id,correct);
  feedback={correct,answer:expected};
  sessionTotal++;
  if(correct)sessionCorrect++;
  render();
  setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}

function advLesson(){
  const wasWrong=feedback&&!feedback.correct;
  feedback=null;input="";nearMissActive=false;mcAnswered=false;
  // If wrong on a quiz phase, repeat the same phase
  if(wasWrong&&lessonPhase!=="learn"){
    render();
    setTimeout(()=>document.getElementById("answer-input")?.focus(),50);

function renderBrowse(app){
  const q=browseSearch.trim().toLowerCase();
  function makeCard(w,unlocked){
    const locked=!unlocked||(!isChar(w)&&!vocabUnlocked(w)&&!progress[w.id]?.lessonDone);
    const wc=stageColor(w),tc=toneColor(w.tone||0),ic=itemColor(w);
    return'<div class="browse-card'+(locked?" locked":"")+'" style="'+(locked?"":"background:"+ic+"22;border-color:"+ic+"44")+'" onclick="'+(locked?"":"openWord("+w.id+")")+'">'+'<div class="hanzi-sm" style="color:'+(locked?"#444":wc)+'">'+w.hanzi+'</div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:'+(locked?"#444":tc)+';margin-bottom:2px">'+(locked?"":w.pinyin)+'</div><div class="english-sm">'+(locked?"???":w.english)+'</div></div>';
  }
  if(q){
    const results=VOCAB.filter(w=>w.hanzi.includes(q)||w.pinyin.toLowerCase().includes(q)||w.english.toLowerCase().includes(q));
    const cards=results.map(w=>makeCard(w,itemLevel(w)<=currentLevel)).join("");
    app.innerHTML=navHTML("browse")+'<h2 style="margin-bottom:1rem">Browse</h2><div style="position:relative;margin-bottom:1.5rem"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)">🔍</span><input id="browse-search" type="text" value="'+q.replace(/"/g,"&quot;")+'" placeholder="Search hanzi, pinyin, or English…" style="width:100%;padding:13px 16px 13px 42px;font-size:15px;border-radius:12px;background:var(--surface);color:var(--text);border:1.5px solid var(--red);outline:none;font-family:inherit;font-weight:500" oninput="browseSearch=this.value;renderBrowse(document.getElementById(\'app\'))"/></div><p style="font-size:13px;color:var(--muted);margin-bottom:1rem">'+results.length+' result'+(results.length!==1?"s":"")+'</p>'+(results.length?'<div class="browse-grid">'+cards+'</div>':'<div style="text-align:center;padding:3rem;color:var(--muted)">No items found</div>')+(selectedWord?renderModal():"");
    const inp=document.getElementById("browse-search");if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}return;
  }
  const maxLvl=Math.max(...VOCAB.map(w=>itemLevel(w)),1);
  let html="";
  for(let lvl=1;lvl<=maxLvl;lvl++){
    const unlocked=lvl<=currentLevel;
    const chars=VOCAB.filter(w=>isChar(w)&&itemLevel(w)===lvl);
    const voc=VOCAB.filter(w=>!isChar(w)&&itemLevel(w)===lvl);
    html+='<div class="browse-level-section"><div class="browse-level-header"><span class="browse-level-badge">Level '+lvl+'</span><span style="font-size:13px;color:var(--muted)">'+chars.length+' chars · '+voc.length+' vocab</span><span class="browse-level-lock">'+(unlocked?(lvl===currentLevel?Math.round(levelProgress(lvl)*100)+"% to next level":"✓ complete"):"🔒 locked")+'</span></div>'+(chars.length?'<div class="browse-section-label" style="color:var(--red)">Characters</div><div class="browse-grid">'+chars.map(w=>makeCard(w,unlocked)).join("")+'</div>':"")+(voc.length?'<div class="browse-section-label" style="color:var(--purple)">Vocabulary</div><div class="browse-grid">'+voc.map(w=>makeCard(w,unlocked)).join("")+'</div>':"")+'</div>';
  }
  app.innerHTML=navHTML("browse")+'<h2 style="margin-bottom:1rem">Browse</h2><div style="position:relative;margin-bottom:1.5rem"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)">🔍</span><input id="browse-search" type="text" placeholder="Search hanzi, pinyin, or English…" style="width:100%;padding:13px 16px 13px 42px;font-size:15px;border-radius:12px;background:var(--surface);color:var(--text);border:1.5px solid var(--border2);outline:none;font-family:inherit;font-weight:500;transition:border-color .15s" onfocus="this.style.borderColor=\'var(--red)\'" onblur="this.style.borderColor=\'var(--border2)\'" oninput="browseSearch=this.value;renderBrowse(document.getElementById(\'app\'))"/></div><div style="display:flex;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:3px;background:var(--red);display:inline-block"></span><span style="font-size:12px;color:var(--muted)">Character</span></div><div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:3px;background:var(--purple);display:inline-block"></span><span style="font-size:12px;color:var(--muted)">Vocabulary (unlocks at Guru)</span></div></div>'+html+(selectedWord?renderModal():"");
}

OCAB.find(x=>x.id==='+w.id+');render()}"/><button onclick="addSyn('+w.id+',document.getElementById(\'syn-input\').value);document.getElementById(\'syn-input\').value=\'\';selectedWord=VOCAB.find(x=>x.id==='+w.id+');render()" style="padding:8px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600">Add</button></div></div><button class="modal-close btn-secondary" onclick="closeModal()">Close</button></div></div>';

  if(lessonPhase==="learn"){
    if(settings.autoPlay)setTimeout(()=>speak(w.hanzi),200);
    if(!infoPanelCache[w.id])fetchInfo(w);
    const cached=infoPanelCache[w.id];
    const comps=getComponentWords(w);
    const compsH=comps.length?'<div class="card" style="text-align:left"><div class="card-label">Made from</div><div class="components-row">'+comps.map(c=>'<div class="component-chip"><span class="chip-hanzi" style="color:var(--red)">'+c.hanzi+'</span><div><div style="font-size:12px;font-weight:600">'+c.pinyin+'</div><div class="chip-meaning">'+c.english+'</div></div></div>').join("")+'</div></div>':"";
    app.innerHTML='<div class="session-wrap"><div class="session-header"><button class="btn-back" onclick="screen=\'dashboard\';render()">← back</button><span style="font-size:13px;color:var(--muted)">'+(lessonIdx+1)+' / '+lessonQueue.length+'</span></div><div class="session-progress"><div class="session-progress-fill" style="width:'+Math.round(lessonIdx/lessonQueue.length*100)+'%;background:'+ic+'"></div></div><div style="text-align:center"><div style="margin-bottom:10px"><span class="'+(isChar(w)?"type-badge-char":"type-badge-vocab")+'">'+TYPE_LABELS[w.type]+'</span></div><div class="direction-label">Lesson — Learn</div><div style="display:flex;align-items:center;justify-content:center;gap:14px"><div class="big-hanzi">'+w.hanzi+'</div>'+spkBtn(w.hanzi)+'</div><div class="big-pinyin" style="color:'+tc+'">'+w.pinyin+'</div><div style="font-size:11px;color:'+tc+';font-weight:600;margin-bottom:.5rem">Tone '+(w.tone||0)+'</div><div style="font-size:22px;color:var(--text2);margin:.5rem 0;font-weight:600">'+w.english+'</div><div style="margin-bottom:1rem"><span style="background:'+tc+'22;color:'+tc+';font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px">'+(w.etymology||"Compound")+'</span></div></div><div style="margin-bottom:1.25rem">'+(cached?.meaning?'<div class="card" style="margin-bottom:.6rem;text-align:left"><div class="card-label">Meaning</div><div style="font-size:13px;line-height:1.65;color:#c4b8ba">'+cached.meaning+'</div></div>':'<div class="card" style="margin-bottom:.6rem;color:var(--muted);font-size:13px"><span class="loading-dots">Loading</span></div>')+compsH+(cached?.context?'<div class="card" style="text-align:left"><div class="card-label" style="display:flex;align-items:center;justify-content:space-between"><span>Example</span>'+spkBtn(w.example_zh||w.hanzi,"13px")+'</div><div style="font-size:13px;line-height:1.75;color:#c4b8ba">'+cached.context+'</div></div>':'<div class="card" style="color:var(--muted);font-size:13px"><span class="loading-dots">Loading example</span></div>')+'</div><button id="next-btn" class="check-btn" style="background:'+ic+'" onclick="advLesson()">Got it →</button></div>';
    setTimeout(()=>document.getElementById("next-btn")?.focus(),50);return;
  }
  const isMeaning=lessonPhase==="quiz-meaning",isReading=lessonPhase==="quiz-reading",isHanzi=lessonPhase==="quiz-hanzi";

  if(isHanzi){

    if(!feedback){mcOptions=generateMCOptions(w);mcAnswered=false;}
    const header='<div class="session-wrap"><div class="session-header"><button class="btn-back" onclick="screen=\'dashboard\';render()">← back</button><span style="font-size:13px;color:var(--muted)">'+(lessonIdx+1)+' / '+lessonQueue.length+' · Quiz 3/3</span></div><div class="session-progress"><div class="session-progress-fill" style="width:'+Math.round(lessonIdx/lessonQueue.length*100)+'%;background:'+ic+'"></div></div><div style="text-align:center"><div style="margin-bottom:8px"><span class="'+(isChar(w)?"type-badge-char":"type-badge-vocab")+'">'+TYPE_LABELS[w.type]+'</span></div><div class="direction-label">🇬🇧 English → Hanzi</div><div style="font-size:26px;font-weight:700;margin:1.5rem 0;color:var(--text2)">'+w.english+'</div><div class="prompt-label">Which is the correct hanzi?</div>';
    app.innerHTML=header+renderMCOptions(mcOptions,w.id,true)+'</div></div>';
    return;
  }

  const prompt=isHanzi?w.english:w.hanzi;
  const nextLabel=lessonIdx+1<lessonQueue.length?"Next →":"Finish lessons";
  const btnCol=feedback?(feedback.correct?"var(--green)":"var(--red)"):ic;
  app.innerHTML='<div class="session-wrap"><div class="session-header"><button class="btn-back" onclick="screen=\'dashboard\';render()">← back</button><span style="font-size:13px;color:var(--muted)">'+(lessonIdx+1)+' / '+lessonQueue.length+' · Quiz '+(isMeaning?"1":"2")+'/3</span></div><div class="session-progress"><div class="session-progress-fill" style="width:'+Math.round(lessonIdx/lessonQueue.length*100)+'%;background:'+ic+'"></div></div><div style="text-align:center"><div style="margin-bottom:8px"><span class="'+(isChar(w)?"type-badge-char":"type-badge-vocab")+'">'+TYPE_LABELS[w.type]+'</span></div><div class="direction-label">'+(isMeaning?"🇨🇳 Hanzi → English":"🇨🇳 Hanzi → Pinyin")+'</div><div style="'+(isMeaning?"font-family:\'Noto Serif SC\',serif;font-size:90px;text-align:center;line-height:1;margin:1rem 0 .25rem":"font-family:\'Noto Serif SC\',serif;font-size:90px;text-align:center;line-height:1;margin:1rem 0 .25rem")+'">'+(isMeaning?w.hanzi:w.hanzi)+'</div>'+(isMeaning&&settings.showPinyinOnReview?'<div class="big-pinyin" style="color:'+tc+'">'+w.pinyin+'</div>':'')+' <div class="prompt-label">'+(isMeaning?"What is the English meaning?":"Type the pinyin reading")+'</div><input id="answer-input" type="text" lang="'+(isHanzi?"zh-Hans":"en")+'" class="'+(ic===TYPE_COLORS.vocab?"vocab-mode":"")+" "+(feedback?(feedback.correct?"correct":"wrong"):"")+'" value="'+input.replace(/"/g,"&quot;")+'" placeholder="'+(isMeaning?"Type English meaning…":"Type pinyin (e.g. ni3 hao3)…")+'" '+(feedback?"disabled":"")+'/>'+(feedback?'<div class="feedback '+(feedback.correct?"correct":"wrong")+'">'+(feedback.correct?"✓ Correct!":"✗ Wrong — correct answer: "+feedback.answer)+'</div>'+closeEnoughBtn(isMeaning?"meaning":"reading"):"")+' <button id="next-btn" class="check-btn" style="background:'+btnCol+'" onclick="submitLesson()">'+(feedback?nextLabel:"Check →")+'</button>'+infoBtnHTML(w.id)+'</div></div>';
  if(!feedback){const inp=document.getElementById("answer-input");inp.focus();inp.lang=isHanzi?"zh-Hans":"en";inp.addEventListener("input",e=>input=e.target.value);inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();submitLesson();}});if(infoPanelOpen)closeInfo();}else setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}
function renderReview(app){
  const{word:w,type}=reviewQueue[reviewIdx],ic=itemColor(w),tc=toneColor(w.tone||0),sc=STAGE_COLORS[SRS_STAGES[progress[w.id].stage]]||"#888",btnCol=feedback?(feedback.correct?"var(--green)":"var(--red)"):ic;

  if(type==="hanzi"){
    // Multiple choice for hanzi recognition
    if(!feedback){mcOptions=generateMCOptions(w);mcAnswered=false;}
    const prompt=w.english;
    const header='<div class="session-wrap"><div class="session-header"><button class="btn-back" onclick="screen=\'dashboard\';render()">← back</button><span style="font-size:13px;color:var(--muted)">'+(reviewIdx+1)+' / '+reviewQueue.length+'</span><div style="display:flex;align-items:center;gap:6px"><span class="'+(isChar(w)?"type-badge-char":"type-badge-vocab")+'" style="font-size:10px;padding:2px 7px">'+(isChar(w)?"Char":"Vocab")+'</span><span class="stage-badge" style="background:'+sc+'22;color:'+sc+'">'+SRS_STAGES[progress[w.id].stage]+'</span></div></div><div class="session-progress"><div class="session-progress-fill" style="width:'+Math.round(reviewIdx/reviewQueue.length*100)+'%;background:'+ic+'"></div></div><div style="text-align:center"><div class="direction-label">🇬🇧 English → Hanzi</div><div style="font-size:26px;font-weight:700;margin:1.5rem 0;color:var(--text2)">'+prompt+'</div><div class="prompt-label">Which is the correct hanzi?</div>';
    app.innerHTML=header+renderMCOptions(mcOptions,w.id,false)+'</div></div><div class="stats-bar"><span>✓ '+sessionCorrect+'</span><span>✗ '+(sessionTotal-sessionCorrect)+'</span><span>'+(sessionTotal>0?Math.round(sessionCorrect/sessionTotal*100):0)+'%</span></div></div>';
    return;
  }

  const prompt=(type==="meaning"||type==="reading")?w.hanzi:w.english;
  app.innerHTML='<div class="session-wrap"><div class="session-header"><button class="btn-back" onclick="screen=\'dashboard\';render()">← back</button><span style="font-size:13px;color:var(--muted)">'+(reviewIdx+1)+' / '+reviewQueue.length+'</span><div style="display:flex;align-items:center;gap:6px"><span class="'+(isChar(w)?"type-badge-char":"type-badge-vocab")+'" style="font-size:10px;padding:2px 7px">'+(isChar(w)?"Char":"Vocab")+'</span><span class="stage-badge" style="background:'+sc+'22;color:'+sc+'">'+SRS_STAGES[progress[w.id].stage]+'</span></div></div><div class="session-progress"><div class="session-progress-fill" style="width:'+Math.round(reviewIdx/reviewQueue.length*100)+'%;background:'+ic+'"></div></div><div style="text-align:center"><div class="direction-label">'+(type==="meaning"?"🇨🇳 Hanzi → English":type==="reading"?"🇨🇳 Hanzi → Pinyin":"🇬🇧 English → Hanzi")+'</div><div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:.75rem 0 .25rem">'+(type!=="hanzi"?'<div style="font-family:\'Noto Serif SC\',serif;font-size:100px;line-height:1">'+w.hanzi+'</div>'+spkBtn(w.hanzi):'<div style="font-size:32px;font-weight:700">'+prompt+'</div>')+'</div>'+(type==="meaning"&&settings.showPinyinOnReview?'<div class="big-pinyin" style="color:'+tc+'">'+w.pinyin+'</div>':'')+' <div class="prompt-label">'+(type==="meaning"?"What is the English meaning?":type==="reading"?"What is the pinyin reading?":"Type the hanzi character(s)")+'</div><input id="answer-input" type="text" class="'+(ic===TYPE_COLORS.vocab?"vocab-mode":"")+" "+(feedback?(feedback.correct?"correct":"wrong"):"")+'" value="'+input.replace(/"/g,"&quot;")+'" placeholder="'+(type==="meaning"?"Type English meaning…":type==="reading"?"Type pinyin (e.g. ni3 hao3)…":"Type hanzi…")+'" '+(feedback?"disabled":"")+'/>'+(feedback?'<div class="feedback '+(feedback.correct?"correct":"wrong")+'">'+(feedback.correct?"✓ Correct!":"✗ Wrong — correct answer: "+feedback.answer)+'</div>'+closeEnoughBtn(type):"")+' <button id="next-btn" class="check-btn" style="background:'+btnCol+'" onclick="submitReview()">'+(feedback?reviewIdx+1<reviewQueue.length?"Next →":"Finish reviews":"Check →")+'</button></div><div class="stats-bar"><span>✓ '+sessionCorrect+'</span><span>✗ '+(sessionTotal-sessionCorrect)+'</span><span>'+(sessionTotal>0?Math.round(sessionCorrect/sessionTotal*100):0)+'%</span></div>'+infoBtnHTML(w.id)+'</div>';
  if(!feedback){const inp=document.getElementById("answer-input");inp.focus();inp.lang=type==="hanzi"?"zh-Hans":"en";if(type==="hanzi"){inp.setAttribute("inputmode","text");}else{inp.removeAttribute("inputmode");}inp.addEventListener("input",e=>input=e.target.value);inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();submitReview();}});if(infoPanelOpen)closeInfo();}else setTimeout(()=>document.getElementById("next-btn")?.focus(),50);
}

function openPicker(){pickerSelected=new Set();screen="picker";render();}
function togglePick(id){if(pickerSelected.has(id))pickerSelected.delete(id);else pickerSelected.add(id);render();}
function selAll(type){availableLessons().filter(w=>!type||w.type===type).forEach(w=>pickerSelected.add(w.id));render();}
function startPicker(){if(!pickerSelected.size)return;lessonQueue=VOCAB.filter(w=>pickerSelected.has(w.id));lessonIdx=0;lessonPhase="learn";input="";feedback=null;sessionCorrect=0;sessionTotal=0;sessionDone=false;showLevelUp=false;sessionStartTime=Date.now();screen="lesson";render();}
function renderPicker(app){
  const avail=availableLessons(),chars=avail.filter(w=>isChar(w)),voc=avail.filter(w=>!isChar(w)),sel=pickerSelected.size;
  const wb=(w)=>'<div class="picker-word'+(pickerSelected.has(w.id)?(isChar(w)?" sel-char":" sel-vocab"):"")+'" onclick="togglePick('+w.id+')" title="'+w.english+'">'+w.hanzi+'</div>';
  app.innerHTML=navHTML("dashboard")+'<button class="btn-back" onclick="screen=\'dashboard\';render()">← back</button><h2 style="margin-top:8px;margin-bottom:3px">Lesson Picker</h2><p class="sub">Vocab only shows when component characters are Guru+.</p>'+(chars.length?'<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="card-label" style="margin-bottom:0;color:var(--red)">Characters ('+chars.length+')</div><button onclick="selAll(\'character\')" style="background:none;border:none;color:var(--red);font-size:12px;font-weight:600;padding:0;cursor:pointer">Select all</button></div><div class="picker-grid">'+chars.map(wb).join("")+'</div></div>':"")+( voc.length?'<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="card-label" style="margin-bottom:0;color:var(--purple)">Vocabulary ('+voc.length+')</div><button onclick="selAll(\'vocab\')" style="background:none;border:none;color:var(--purple);font-size:12px;font-weight:600;padding:0;cursor:pointer">Select all</button></div><div class="picker-grid">'+voc.map(wb).join("")+'</div></div>':"")+(!avail.length?'<div class="card"><p style="color:var(--muted);font-size:14px">No lessons available! Guru more characters to unlock vocab.</p></div>':"")+' <div style="position:sticky;bottom:1rem;padding-top:.5rem"><button class="btn-lesson" style="width:100%;'+(sel===0?"opacity:.35;cursor:not-allowed":"")+'" onclick="startPicker()" '+(sel===0?"disabled":"")+'>'+(sel>0?"Start "+sel+" item"+(sel>1?"s":""):"Select items above")+' </button></div>';
}
